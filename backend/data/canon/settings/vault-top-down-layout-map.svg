<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000" role="img" aria-labelledby="title desc">
  <title id="title">The Vault Top-Down Layout Map</title>
  <desc id="desc">A top-down schematic of The Vault showing the Reading Stacks, central Map Platform, Ink Well, Field Desk, and Quiet Nook as zones inside one continuous domed archive.</desc>
  <defs>
    <style>
      .bg { fill: #f3f0e4; }
      .dome { fill: #f3f0e4; stroke: #224e5a; stroke-width: 10; }
      .dome-band { fill: none; stroke: #224e5a; stroke-width: 34; opacity: 0.96; }
      .catalog { fill: none; stroke: #c79b44; stroke-width: 4; stroke-linecap: round; opacity: 0.9; }
      .catalog-soft { fill: none; stroke: #c79b44; stroke-width: 2.5; stroke-linecap: round; opacity: 0.55; stroke-dasharray: 10 14; }
      .platform { fill: #f8f4e8; stroke: #c79b44; stroke-width: 12; }
      .platform-inner { fill: #bfdde2; stroke: #224e5a; stroke-width: 3; opacity: 0.48; }
      .zone { stroke-width: 4; }
      .stacks { fill: #dbe5df; stroke: #224e5a; }
      .inkwell { fill: #fff7df; stroke: #ff8a2a; }
      .fielddesk { fill: #e9ddbd; stroke: #7a5634; }
      .nook { fill: #eef5f4; stroke: #224e5a; }
      .nook-seat { fill: #f3f0e4; stroke: #224e5a; stroke-width: 3; }
      .nook-wood-accent { fill: #7a5634; opacity: 0.82; }
      .screen { fill: #eef5f4; stroke: #224e5a; stroke-width: 3; opacity: 0.95; }
      .wood { fill: #7a5634; }
      .cushion-red { fill: #b94a48; }
      .cushion-green { fill: #6e8f5f; }
      .brass { fill: #c79b44; }
      .label { fill: #27343a; font-family: Arial, Helvetica, sans-serif; font-size: 25px; font-weight: 700; letter-spacing: 0; }
      .sub { fill: #27343a; font-family: Arial, Helvetica, sans-serif; font-size: 17px; letter-spacing: 0; }
      .small { fill: #27343a; font-family: Arial, Helvetica, sans-serif; font-size: 15px; letter-spacing: 0; }
      .zone-title { fill: #27343a; font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0; }
      .zone-sub { fill: #27343a; font-family: Arial, Helvetica, sans-serif; font-size: 14px; letter-spacing: 0; }
      .arrow { fill: none; stroke: #27343a; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); opacity: 0.8; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M 0 0 L 12 5 L 0 10 z" fill="#27343a" opacity="0.8"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#27343a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect class="bg" width="1400" height="1000"/>

  <text x="700" y="58" text-anchor="middle" class="label">The Vault Top-Down Layout Map</text>
  <text x="700" y="86" text-anchor="middle" class="sub">One continuous domed archive. Zones are staging areas, not separate rooms.</text>

  <!-- Outer dome footprint -->
  <ellipse cx="700" cy="520" rx="515" ry="365" class="dome" filter="url(#softShadow)"/>
  <ellipse cx="700" cy="520" rx="500" ry="350" class="dome-band"/>

  <!-- Reading Stacks around the curved perimeter -->
  <path class="zone stacks" d="M 315 350 C 410 230, 535 170, 700 170 C 865 170, 990 230, 1085 350 L 1036 390 C 950 298, 842 252, 700 252 C 558 252, 450 298, 364 390 Z"/>
  <path class="zone stacks" d="M 285 438 C 245 502, 245 620, 285 690 L 350 650 C 325 600, 325 520, 350 475 Z"/>
  <path class="zone stacks" d="M 1115 438 C 1155 502, 1155 620, 1115 690 L 1050 650 C 1075 600, 1075 520, 1050 475 Z"/>

  <!-- Tile bay hints in stacks -->
  <g opacity="0.72">
    <rect x="455" y="245" width="80" height="46" rx="10" class="screen"/>
    <rect x="557" y="217" width="82" height="48" rx="10" class="screen"/>
    <rect x="681" y="207" width="82" height="48" rx="10" class="screen"/>
    <rect x="805" y="217" width="82" height="48" rx="10" class="screen"/>
    <rect x="907" y="245" width="80" height="46" rx="10" class="screen"/>
    <rect x="284" y="510" width="48" height="78" rx="10" class="screen"/>
    <rect x="1068" y="510" width="48" height="78" rx="10" class="screen"/>
  </g>

  <!-- Quiet Nook at lower-left edge: youthful modular child-scale seating, not an adult lounge -->
  <path class="zone nook" d="M 360 688 C 445 780, 555 825, 668 832 L 650 760 C 548 750, 475 715, 414 650 Z"/>
  <rect x="444" y="723" width="76" height="34" rx="14" class="nook-seat"/>
  <rect x="534" y="723" width="76" height="34" rx="14" class="nook-seat"/>
  <rect x="454" y="750" width="56" height="8" rx="4" class="nook-wood-accent"/>
  <rect x="544" y="750" width="56" height="8" rx="4" class="nook-wood-accent"/>
  <rect x="462" y="686" width="38" height="30" rx="8" class="cushion-red"/>
  <rect x="520" y="686" width="38" height="30" rx="8" class="cushion-green"/>
  <rect x="582" y="690" width="34" height="46" rx="8" class="screen"/>
  <circle cx="628" cy="708" r="13" class="brass"/>
  <path d="M 628 696 L 628 668" stroke="#c79b44" stroke-width="5" stroke-linecap="round"/>
  <circle cx="628" cy="660" r="16" fill="#ffdfa3" opacity="0.75"/>

  <!-- Field Desk near reading island -->
  <rect x="755" y="710" width="225" height="92" rx="22" class="zone fielddesk"/>
  <rect x="780" y="730" width="54" height="38" rx="6" fill="#f8f4e8" stroke="#7a5634" stroke-width="2"/>
  <rect x="850" y="726" width="70" height="48" rx="6" fill="#f8f4e8" stroke="#7a5634" stroke-width="2"/>
  <rect x="930" y="738" width="32" height="32" rx="5" fill="#bfdde2" stroke="#224e5a" stroke-width="2"/>

  <!-- Central Map Platform -->
  <circle cx="700" cy="520" r="150" class="platform" filter="url(#softShadow)"/>
  <circle cx="700" cy="520" r="105" class="platform-inner"/>
  <path class="catalog-soft" d="M 645 515 C 675 468, 733 466, 762 505 C 787 538, 760 584, 712 586 C 668 587, 629 556, 645 515 Z"/>
  <rect x="675" y="488" width="50" height="66" rx="7" fill="#e9ddbd" stroke="#7a5634" stroke-width="3"/>
  <path d="M 685 499 L 715 499 M 685 516 L 715 516 M 685 533 L 706 533" stroke="#7a5634" stroke-width="3" stroke-linecap="round"/>

  <!-- Ink Well attached to platform -->
  <rect x="820" y="448" width="154" height="96" rx="24" class="zone inkwell"/>
  <rect x="845" y="472" width="80" height="36" rx="10" fill="#f3f0e4" stroke="#ff8a2a" stroke-width="3"/>
  <circle cx="940" cy="490" r="12" fill="#16d9ff"/>
  <circle cx="960" cy="490" r="12" fill="#f6c84c"/>
  <circle cx="950" cy="516" r="12" fill="#ff3bd5"/>

  <!-- Page screens / shared Vault kit -->
  <rect x="545" y="330" width="80" height="125" rx="18" class="screen"/>
  <rect x="1038" y="356" width="70" height="115" rx="16" class="screen"/>
  <rect x="292" y="352" width="70" height="115" rx="16" class="screen"/>

  <!-- Catalog line system -->
  <path class="catalog" d="M 700 370 L 700 252"/>
  <path class="catalog" d="M 700 670 L 700 760"/>
  <path class="catalog" d="M 550 520 L 350 520"/>
  <path class="catalog" d="M 850 520 L 1050 520"/>
  <path class="catalog-soft" d="M 595 415 C 520 360, 455 335, 365 350"/>
  <path class="catalog-soft" d="M 805 415 C 880 360, 945 335, 1035 350"/>
  <path class="catalog-soft" d="M 585 625 C 505 685, 462 715, 420 738"/>
  <path class="catalog-soft" d="M 815 625 C 865 675, 910 705, 967 738"/>

  <!-- Zone labels -->
  <text x="700" y="308" text-anchor="middle" class="zone-title">Reading Stacks</text>
  <text x="700" y="331" text-anchor="middle" class="zone-sub">archive wall modules + story tiles</text>

  <text x="700" y="515" text-anchor="middle" class="zone-title">Map Platform</text>
  <text x="700" y="540" text-anchor="middle" class="zone-sub">portal launch from story object</text>

  <text x="898" y="420" text-anchor="middle" class="zone-title">Ink Well</text>
  <text x="898" y="443" text-anchor="middle" class="zone-sub">tool test station</text>

  <text x="868" y="835" text-anchor="middle" class="zone-title">Field Desk</text>
  <text x="868" y="858" text-anchor="middle" class="zone-sub">evidence + review setup</text>

  <text x="520" y="835" text-anchor="middle" class="zone-title">Quiet Nook</text>
  <text x="520" y="858" text-anchor="middle" class="zone-sub">warm reflection area</text>

  <!-- Flow annotations -->
  <path class="arrow" d="M 602 337 C 560 375, 555 420, 605 458"/>
  <path class="arrow" d="M 805 545 C 870 585, 900 635, 885 708"/>
  <path class="arrow" d="M 622 665 C 580 695, 552 720, 535 756"/>

  <!-- Legend -->
  <g transform="translate(1100 735)">
    <rect x="0" y="0" width="230" height="145" rx="18" fill="#ffffff" stroke="#224e5a" stroke-width="3" opacity="0.94"/>
    <text x="18" y="30" class="small" font-weight="700">Map notes</text>
    <circle cx="24" cy="58" r="8" fill="#c79b44"/>
    <text x="42" y="63" class="small">catalog lines guide focus</text>
    <rect x="16" y="78" width="18" height="18" rx="4" fill="#e9ddbd" stroke="#7a5634" stroke-width="2"/>
    <text x="42" y="93" class="small">story-bearing object</text>
    <rect x="16" y="108" width="18" height="18" rx="4" fill="#eef5f4" stroke="#224e5a" stroke-width="2"/>
    <text x="42" y="123" class="small">page screen or tile</text>
  </g>
</svg>
