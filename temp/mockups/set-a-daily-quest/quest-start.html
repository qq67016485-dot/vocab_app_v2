<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set A — Quest Start</title>
<link rel="stylesheet" href="../shared.css">
</head><body>

<!-- Top bar: minimal, just identity -->
<div class="top-bar">
  <span>Hi, <strong>Emma</strong></span>
  <span class="badge">Lv 12 · Silver</span>
</div>

<!-- Streak + XP row -->
<div class="stats-row">
  <div class="stat-box">
    <div class="stat-value">7</div>
    <div class="stat-label">Day Streak</div>
  </div>
  <div class="stat-box">
    <div class="stat-value">2,450</div>
    <div class="stat-label">Total XP</div>
  </div>
  <div class="stat-box">
    <div class="stat-value">3</div>
    <div class="stat-label">Freezes</div>
  </div>
</div>

<!-- Today's Quest card -->
<div class="card" style="border-left: 4px solid #4a6cf7;">
  <div class="card-header">Today's Quest</div>
  <p style="margin-bottom: 12px;">
    <strong>3</strong> new words to learn &nbsp;·&nbsp; <strong>8</strong> words to review
  </p>
  <p class="text-muted" style="margin-bottom: 4px;">Estimated time: ~12 min</p>
  <p class="text-muted">XP available: ~65 XP</p>
  <a href="session.html" class="btn btn-primary btn-big">Start Today's Quest</a>
</div>

<!-- Quick links -->
<a href="word-collection.html" class="nav-link">View My Word Collection →</a>

<!-- Flow indicator -->
<hr class="divider">
<p class="text-muted text-center" style="font-size:11px;">
  FLOW: <strong>Quest Start</strong> → Session → Quest Complete
</p>
<p class="nav-link"><a href="../index.html">← Back to all mockups</a></p>

</body></html>
