<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vocab App V2 — Changelog Timeline</title>
<style>
:root {
  --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --line: #2a2f3a;
  --text: #e6e9ef; --muted: #9aa3b2; --accent: #6ea8fe;
  --added: #46c08d; --changed: #d9a441; --fixed: #e0607e;
  --refactor: #b07ee0; --test: #4fb0c6; --chore: #8a93a3;
  --perf: #5ec8a0; --docs: #c9a05e; --other: #8a93a3;
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--bg); color: var(--text);
  font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
header {
  position: sticky; top: 0; z-index: 20; background: rgba(15,17,21,.94);
  backdrop-filter: blur(8px); border-bottom: 1px solid var(--line);
  padding: 18px 28px 14px;
}
h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: .3px; }
.sub { color: var(--muted); font-size: 13px; }
.controls { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
#search {
  flex: 1 1 280px; min-width: 220px; background: var(--panel2); border: 1px solid var(--line);
  color: var(--text); padding: 9px 13px; border-radius: 8px; font-size: 14px; outline: none;
}
#search:focus { border-color: var(--accent); }
.filters { display: flex; flex-wrap: wrap; gap: 7px; }
.chip {
  cursor: pointer; user-select: none; padding: 5px 11px; border-radius: 999px;
  font-size: 12.5px; border: 1px solid var(--line); background: var(--panel2);
  color: var(--muted); transition: all .12s;
}
.chip.on { color: #0f1115; font-weight: 600; }
.chip[data-cat="Added"].on    { background: var(--added); border-color: var(--added); }
.chip[data-cat="Changed"].on  { background: var(--changed); border-color: var(--changed); }
.chip[data-cat="Fixed"].on    { background: var(--fixed); border-color: var(--fixed); }
.chip[data-cat="Refactor"].on { background: var(--refactor); border-color: var(--refactor); }
.chip[data-cat="Test"].on     { background: var(--test); border-color: var(--test); }
.chip[data-cat="Perf"].on     { background: var(--perf); border-color: var(--perf); }
.chip[data-cat="Chore"].on    { background: var(--chore); border-color: var(--chore); }
.chip[data-cat="Docs"].on     { background: var(--docs); border-color: var(--docs); }
.chip[data-cat="Other"].on    { background: var(--other); border-color: var(--other); }
.meta-line { color: var(--muted); font-size: 12.5px; margin-top: 10px; }
main { max-width: 1100px; margin: 0 auto; padding: 26px 28px 80px; }
.timeline { position: relative; padding-left: 38px; }
.timeline::before {
  content: ""; position: absolute; left: 12px; top: 6px; bottom: 6px;
  width: 2px; background: var(--line);
}
.entry { position: relative; margin-bottom: 26px; }
.entry::before {
  content: ""; position: absolute; left: -32px; top: 7px; width: 13px; height: 13px;
  border-radius: 50%; background: var(--accent); border: 3px solid var(--bg);
  box-shadow: 0 0 0 1px var(--line);
}
.entry.hidden { display: none; }
.ehead { display: flex; flex-wrap: wrap; align-items: baseline; gap: 10px; margin-bottom: 8px; }
.date { font-size: 16px; font-weight: 700; letter-spacing: .3px; }
.ver { font-size: 12px; color: var(--muted); background: var(--panel2);
  border: 1px solid var(--line); padding: 2px 8px; border-radius: 6px; }
.note { font-size: 13px; color: var(--accent); font-style: italic; }
.card {
  background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
  overflow: hidden;
}
.section { border-top: 1px solid var(--line); }
.section:first-child { border-top: none; }
.shead {
  display: flex; align-items: center; gap: 10px; padding: 11px 16px; cursor: pointer;
}
.shead:hover { background: var(--panel2); }
.tag {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
  padding: 3px 9px; border-radius: 6px; color: #0f1115; white-space: nowrap;
}
.stitle { font-size: 14.5px; font-weight: 600; flex: 1; }
.caret { color: var(--muted); font-size: 12px; transition: transform .15s; }
.section.collapsed .caret { transform: rotate(-90deg); }
.sbody { padding: 2px 18px 14px 18px; font-size: 13.6px; color: #d2d7e0; }
.section.collapsed .sbody { display: none; }
.sbody ul { margin: 6px 0; padding-left: 20px; }
.sbody li { margin: 4px 0; }
.sbody p.blocknote { margin: 6px 0; }
.sbody code {
  background: #0c0e12; border: 1px solid var(--line); border-radius: 4px;
  padding: 1px 5px; font-size: 12.5px; font-family: "SFMono-Regular", Consolas, monospace;
  color: #cdd6e6;
}
.sbody strong { color: #fff; }
.empty { text-align: center; color: var(--muted); padding: 40px; }
.tag-Added{background:var(--added);}
.tag-Changed{background:var(--changed);}
.tag-Fixed{background:var(--fixed);}
.tag-Refactor{background:var(--refactor);}
.tag-Test{background:var(--test);}
.tag-Perf{background:var(--perf);}
.tag-Chore{background:var(--chore);}
.tag-Docs{background:var(--docs);}
.tag-Other{background:var(--other);}
.toolbar { display:flex; gap:8px; margin-left:auto; }
.tbtn { font-size:12px; color:var(--muted); cursor:pointer; background:none;
  border:1px solid var(--line); border-radius:6px; padding:4px 9px; }
.tbtn:hover { color:var(--text); border-color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1>Vocab App V2 — Changelog Timeline</h1>
  <div class="sub">2026-02-28 → 2026-06-10 · 54 dated entries · generated from <code>docs/CHANGELOG.md</code></div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search titles &amp; details (e.g. audiobook, migration 0035, cloze)…" autocomplete="off">
    <div class="filters" id="filters"></div>
  </div>
  <div class="meta-line">
    <span id="count"></span>
    <span class="toolbar" style="display:inline-flex; margin-left:14px;">
      <button class="tbtn" id="expandAll">Expand all</button>
      <button class="tbtn" id="collapseAll">Collapse all</button>
    </span>
  </div>
</header>
<main>
  <div class="timeline" id="timeline"></div>
  <div class="empty" id="empty" style="display:none">No entries match your filters.</div>
</main>
<script>
const DATA = [{"version": "Unreleased", "date": "2026-06-10", "note": "admin review UI: redesigned for 3 graphic novel candidates", "sections": [{"category": "Changed", "title": "Teacher Portal Widened + Candidate-Aware Generation Views", "html": "<ul>\n<li>The admin generation views still rendered as if a pack had one graphic novel. With 3 candidates × 3 progress surfaces (review, planning substeps, image generation), each surface either repeated the same list 3× with no candidate label or stacked everything into a long vertical scroll. This redesign makes all three candidate-aware and uses the extra width.</li>\n<li><strong>Wider portal</strong> (<code>frontend/src/styles/teacher.css</code>): <code>.t-shell</code> <code>max-width</code> 1400px → 1760px — more horizontal room for every teacher page, which the candidate views below depend on.</li>\n<li><strong>Candidate review</strong> (<code>GenerationReview.jsx</code>): replaced the vertical stack of full <code>CandidateCard</code>s with a <strong>compare strip + detail</strong> layout. New <code>PackGraphicNovels</code> renders one compact <code>CandidateStripRow</code> per candidate (label, title, lexile/page count, a horizontal band of page thumbnails, Select button — selected outlined green, focused highlighted) above a full-width <code>CandidateDetail</code> panel showing the focused candidate&#x27;s large page grid (280px min columns) with per-page edit/redraw + audio controls and its cloze. Clicking a row focuses it; focus defaults to the selected candidate (else first). All existing wiring (select, edit, redraw, novel- and page-level audio, cloze, &quot;no candidate selected&quot; warning) preserved.</li>\n<li><strong>Planning Substeps accordion</strong> (<code>GenerationJobStatus.jsx</code>): each pack runs the 6 substeps once per candidate, but the accordion grouped only by pack — so the list repeated 3× with no way to tell which candidate an API call belonged to. Now grouped <strong>by pack → by candidate</strong>: new <code>renderCandidateSubsteps</code> nests each candidate&#x27;s substeps under its own collapsible &quot;Candidate N&quot; header (completed candidates auto-collapse, failed ones get a red border + stay open). The per-substep restart (↻) now passes <code>candidate_index</code> to <code>restart-substep/</code> (endpoint already accepted it), and the in-flight key is <code>pack_candidate_substep</code> so restarting one candidate doesn&#x27;t grey out the same row in the others.</li>\n<li><strong>Image-generation progress</strong> (<code>GenerationJobStatus.jsx</code>): replaced the flat per-page list (pack × 3 candidates × 6-7 pages = 40+ stacked rows) with <code>GraphicNovelImageProgress</code> — pages grouped by pack → candidate, each candidate a single row with a <code>done/total</code> count and one small status chip per page (hover for page number/status/attempts/error). Status panel widened <code>maxWidth</code> 680 → 1000.</li>\n<li><strong>Backend</strong> (<code>generation_views.py</code>): <code>_graphic_novel_image_page_statuses</code> now includes <code>candidate_index</code> per page; <code>_graphic_novel_script_substep_statuses</code> regroups logs by <code>(pack_id, candidate_index)</code> and returns a <code>candidates</code> array per pack (each with its own substep map), extracting <code>_new_substep_map()</code>. <strong>Payload shape change</strong> — the per-pack substep payload is now <code>{pack_id, pack_label, candidates: [{candidate_index, substeps: [...]}]}</code> instead of <code>{..., substeps: [...]}</code>; the new frontend reads <code>pack.candidates</code>, so backend + frontend must deploy together.</li>\n<li>Tests: <code>test_views.py::test_job_status_includes_graphic_novel_script_substeps</code> updated to the nested shape and asserts two candidates group separately. <code>TestGenerationViews</code> (32) passes.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-10", "note": "tests: fix process-global cache leak between tests", "sections": [{"category": "Fixed", "title": "Test Isolation: Shared `LocMemCache` Leaked Config Across Tests", "html": "<ul>\n<li>Running the full <code>pytest</code> suite showed ~40 failures that all vanished when the affected files were run alone — the classic &quot;passes alone, fails in suite&quot; signature of a cross-test state leak (not flakiness, not a DB deadlock). Traced to the <strong>first</strong> real failure: <code>test_orchestrator.py::test_retries_default_model_then_uses_backup_model</code> expected the migration-seeded <code>DEFAULT_MODEL</code> but received <code>model-3-primary</code>.</li>\n<li><strong>Root cause</strong>: the project has no <code>CACHES</code> setting, so Django falls back to the in-process <code>LocMemCache</code>. That cache is process-global and is <strong>not</strong> rolled back between tests the way the DB is (pytest-django only wraps DB transactions). <code>test_llm_config_sets.py</code> seeds <code>model-3-primary</code>/<code>model-3-fallback</code> into <code>llm_config_service</code>&#x27;s cache (key <code>llm_step_configs_all</code>, 5-min TTL); the stale entry then poisoned every later test that called <code>get_step_config</code>, cascading into dozens of downstream failures.</li>\n<li><strong>Fix</strong> (<code>backend/tests/conftest.py</code>, new file): a project-wide autouse fixture that calls <code>cache.clear()</code> before and after every test, isolating the whole class of cache-leak bugs rather than just this one symptom. No production code changed.</li>\n<li>Verified: the two interacting files pass together (23), and the full suite is <strong>482 passed</strong> (was failing mid-run). The suggested &quot;serialize threaded tests / add deadlock retry&quot; was unnecessary — there was no deadlock.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-10", "note": "graphic novel: 3 candidate novels per pack + admin selection", "sections": [{"category": "Added", "title": "Multi-Candidate Graphic Novels with Manual Publish Gate", "html": "<ul>\n<li>LLM generation variance meant a pack&#x27;s single graphic novel could land anywhere on the quality curve (story idea, script, art) with no recourse short of a full regen. Now <strong>each pack generates <code>GRAPHIC_NOVEL_CANDIDATE_COUNT = 3</code> independent candidate novels</strong> — each from its own full team-selection→router→scorer→cloze→beat→script workflow, so they diverge in story, framing, and art — and an admin picks the best one to publish. Cost/time was explicitly accepted as a non-concern.</li>\n<li><strong>Schema</strong> (migration <code>0035_graphic_novel_candidates</code>): <code>GraphicNovel</code> gained <code>candidate_index</code> (0-2) + <code>is_selected</code>, with <code>unique_together</code> changed <code>(&#x27;pack&#x27;,&#x27;channel&#x27;)</code> → <code>(&#x27;pack&#x27;,&#x27;candidate_index&#x27;)</code>. <code>channel</code> is now a dead column (always <code>&#x27;5page&#x27;</code>, kept pending removal — the name never meant page length). <code>ClozeItem</code> gained a nullable <code>novel</code> FK: <code>novel=None</code> = promoted/active (student-facing), <code>novel=&lt;id&gt;</code> = staged candidate cloze. Existing novels backfilled to <code>candidate_index=0, is_selected=True</code>; existing cloze stays <code>novel=None</code>.</li>\n<li><strong>No auto-select / publish gate</strong>: until an admin selects a candidate, none is <code>is_selected</code>, so the pack&#x27;s graphic novel + cloze are invisible to students (<code>instructional_service</code> reads <code>is_selected=True</code> and <code>cloze_items.filter(novel__isnull=True)</code>). The pack reads as not-yet-published — deliberate, so a human curates before students see it.</li>\n<li><strong>Selection API</strong>: <code>POST /api/graphic-novels/&lt;novel_id&gt;/select/</code> (<code>SelectGraphicNovelCandidateView</code> → new <code>services/graphic_novel_selection_service.select_graphic_novel_candidate</code>). Sets <code>is_selected</code>, clears siblings, and <strong>promotes</strong> the chosen candidate&#x27;s staged cloze to the pack&#x27;s active set (deletes prior promoted rows, re-creates from the selected novel&#x27;s). Idempotent + reversible. Losing candidates are kept (hidden). Audiobook stays manual — admin only triggers <code>generate-audio</code> on the selected novel.</li>\n<li><strong>Generation engine refactor</strong> (<code>graphic_novel_script.py</code>): <code>restart_graphic_novel_from_substep(..., candidate_index)</code> is now the single per-candidate generation engine — both fresh runs and resume delegate to it, removing ~200 lines of duplicated workflow. <code>_step_graphic_novel_script</code> is pure orchestration (loops packs × candidates, skips complete candidates, resumes incomplete ones). Resume keys, COMPLETED logs, and on-disk artifacts are all keyed per-<code>(pack, candidate_index)</code>; artifacts live under <code>temp/generation_artifacts/job_&lt;id&gt;/pack_&lt;id&gt;_&lt;slug&gt;/cand_&lt;i&gt;/</code>. <code>restart-substep</code> API gained an optional <code>candidate_index</code> (default 0).</li>\n<li><strong>Images</strong>: the GRAPHIC_NOVEL_IMAGES step now renders pages for <strong>all</strong> candidate novels (so the admin compares fully-rendered candidates), resetting cross-page continuity at each novel boundary.</li>\n<li><strong>Admin review</strong> (<code>GenerationJobContentView</code>, <code>WordSetContentView</code>): return <code>graphic_novels</code> (array of all candidates, each with its own staged cloze) plus <code>graphic_novel</code> (the selected one, or null). <strong>Frontend</strong> (<code>GenerationReview.jsx</code>): each candidate renders as a <code>CandidateCard</code> with a &quot;Select this candidate&quot; button + selected badge; per-page image edit/redraw and audio controls operate within each candidate. <code>GenerationWizard.jsx</code> updated to the <code>graphic_novels</code> array shape.</li>\n<li>Tests: new <code>tests/vocabulary/test_graphic_novel_selection.py</code> (selection flips flags + promotes/replaces cloze, idempotent) and <code>TestGraphicNovelCandidates</code> in <code>test_step_graphic_novel_script.py</code> (3 unselected candidates, isolated artifacts, complete-candidate skip on rerun). Existing per-candidate workflow tests forced to single-candidate via an autouse fixture. All test files touched pass together (208).</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-09", "note": "audiobook: per-page regeneration in admin review", "sections": [{"category": "Added", "title": "Per-Page Read-Along Audio Regeneration (Admin Review)", "html": "<ul>\n<li>A graphic novel page can lose its audio when a single TTS API call fails mid-run — the novel finishes with a gap. The Generation Review page previously offered <strong>only</strong> a novel-level &quot;Regen audio&quot; button which, once any page had audio, forced <code>regenerate=true</code> and re-synthesized <strong>every</strong> page. There was no way to fill in just the one missing/failed page.</li>\n<li>The backend per-page endpoint <code>POST /api/graphic-novel-pages/&lt;page_id&gt;/regenerate-audio/</code> (async daemon thread, <strong>202</strong>/<strong>409</strong>, reuses the novel&#x27;s cached voice direction so no extra LLM call) already existed — this change wires it into the admin UI.</li>\n<li><strong>Frontend</strong> (<code>GraphicNovelPageEditor.jsx</code>): new <code>AudioRow</code> sub-component under each page card — the <code>&lt;audio&gt;</code> player (when present) plus a per-page button labelled &quot;🔊 Generate audio&quot; / &quot;↺ Regen audio&quot; / &quot;⏳ Generating…&quot; based on that page&#x27;s audio status, with an inline &quot;Audio failed&quot; indicator (the error text shows in the tooltip). New props <code>audioStatus</code> / <code>audioError</code> / <code>onRegenAudio</code>.</li>\n<li><strong>Frontend</strong> (<code>GenerationReview.jsx</code>): new <code>regeneratePageAudio(novelId, pageId, pageNumber)</code> callback — optimistically marks just that page <code>RUNNING</code>, POSTs the per-page endpoint, then reuses the existing novel-level <code>audio-status/</code> poll (its payload is already keyed per page). The content seed now carries <code>page_id</code> so the page entry can be matched on the optimistic update.</li>\n<li>The novel-level &quot;Regen audio&quot; button is unchanged and still available for a full re-synthesis.</li>\n<li>Tests: <code>tests/vocabulary/test_audiobook.py</code> adds <code>TestRegeneratePageAudioView</code> (4 cases: 202 success, 404 missing page, 409 when already running, and a worker test proving it regenerates one page without touching its siblings). <strong>47 audiobook tests pass.</strong></li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-09", "note": "primer: syllable breaks preserve spelling", "sections": [{"category": "Fixed", "title": "Primer Syllable Breakdowns No Longer Misspell Words", "html": "<ul>\n<li>Primer cards sometimes showed phonetically respelled syllable text (e.g. <code>sim·i·lee</code> for &quot;simile&quot;, <code>ev·ry</code> for &quot;every&quot;) instead of the word&#x27;s real spelling. Root cause: <code>prompts/primer_generation.txt</code> explicitly instructed the LLM to use <strong>phonetic (sound-based) syllable breaks rather than orthographic (spelling-based)</strong> ones, with <code>ev·ry</code> given as a model answer — the prompt was asking for misspellings.</li>\n<li><strong>Prompt fix</strong>: replaced the phonetic-preference guideline with a hard spelling-preservation rule — keep the word&#x27;s exact spelling, only insert middle dots (·) between syllables, never add/drop/change letters; removing the dots must reproduce the word letter-for-letter (<code>sim·i·le</code> not <code>sim·i·lee</code>; <code>ev·er·y</code> not <code>ev·ry</code>).</li>\n<li><strong>Code safety net</strong> (<code>services/generation/step_packs.py</code>): new pure helper <code>_sanitize_syllable_text(term, syllable_text)</code> runs on every primer save in <code>_step_generate_primers</code>. It strips separators (·, ., -) and compares the result to the actual word (case-insensitive, whitespace-insensitive); on mismatch it logs a warning and falls back to the correctly-spelled plain term, so a phonetic respelling can never reach students even if a future model ignores the prompt.</li>\n<li>Scope: affects only <strong>newly generated</strong> primer cards. Existing <code>PrimerCardContent.syllable_text</code> rows in the DB are unchanged (no backfill command added).</li>\n<li>Tests: <code>tests/vocabulary/test_step_packs.py</code> adds 2 integration cases (misspelled breakdown falls back, correct breakdown preserved) + a 7-case <code>TestSanitizeSyllableText</code> pure-unit class. <strong>19 pack/primer tests pass.</strong></li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-09", "note": "graphic novel: beat validator tolerates character-name variants", "sections": [{"category": "Fixed", "title": "Beat Complexity Validator No Longer Rejects Re-Labeled Secondary Characters", "html": "<ul>\n<li>A GRAPHIC_NOVEL_SCRIPT job failed with <code>Graphic novel beat planner introduces characters not in the away team or complexity_budget.secondary_characters: [&#x27;Mr. Vidal&#x27;]. Allowed: [&#x27;Amara&#x27;, &#x27;groundskeeper Mr. Vidal&#x27;].</code> The beat sheet named a character <code>Mr. Vidal</code> while the winning premise listed the same person as <code>groundskeeper Mr. Vidal</code>. <code>_validate_beat_complexity</code> (<code>services/generation/graphic_novel_validators.py</code>) compared <code>characters_featured</code> against the allowed set with <strong>exact string set-difference</strong>, so a role-prefix difference for one character read as an unplanned new character and aborted the step.</li>\n<li><strong>Fix</strong>: replaced exact matching with distinctive-name-token overlap. New helpers <code>_significant_name_tokens()</code> (lowercases, strips punctuation, drops role/title stopwords like <code>mr</code>, <code>groundskeeper</code>, <code>the</code>, <code>professor</code>, …) and <code>_name_matches_allowed()</code> (a featured name passes if its significant tokens overlap any allowed label&#x27;s). <code>Mr. Vidal</code> → <code>{vidal}</code> now matches <code>groundskeeper Mr. Vidal</code> → <code>{vidal}</code>, while a genuinely new character (<code>Mr. Stranger</code> → <code>{stranger}</code>) is still rejected. This is the same LLM-surface-variation tolerance already used for cloze blanks and lexile lookups.</li>\n<li>Failed jobs can be recovered without code changes via <code>POST /api/generation-jobs/{id}/restart-substep/</code> (<code>pack_id</code> + the failed substep).</li>\n<li>Tests: existing beat/validator suites pass (51 graphic-novel/validator tests, 2 beat-complexity tests).</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-08", "note": "audiobook: student playback + MP3 companion", "sections": [{"category": "Added", "title": "Student Read-Along Playback Controls", "html": "<ul>\n<li><strong>Frontend</strong> (<code>frontend/src/components/GraphicNovelReader.jsx</code>): students can now play the read-along audio while reading a graphic novel. Each page shows a <strong>Listen / Pause</strong> button (only when that page has audio) and an <strong>Auto-read</strong> toggle switch grouped beside it. With auto-read on, a page&#x27;s audio starts automatically when the student lands on it — the first page and every manual page turn — while still requiring manual page turns (per-page only, no cross-page auto-advance). Audio always stops/resets when the page changes.</li>\n<li>The Auto-read preference is persisted in <code>localStorage</code> (<code>gnReaderAutoplay</code>, default <strong>on</strong>) so it carries across pages, packs, and sessions. Toggling the switch mid-page never interrupts audio already playing — it only affects the next page turn (implemented via an <code>autoplayRef</code> so the page-change effect reads the latest value without re-firing). The switch renders whenever the novel has any audio; the button only when the current page does. Styles in <code>frontend/src/styles/graphic-novel-reader.css</code>.</li>\n<li>Browser autoplay policy caveat: the very first auto-play when the reader opens may be blocked until a user gesture; a blocked <code>play()</code> degrades to the idle &quot;Listen&quot; state, and every subsequent page turn counts as a gesture so those auto-play reliably.</li>\n</ul>"}, {"category": "Added", "title": "Compressed MP3 Companion (Students Stream MP3, WAV Stays Source of Truth)", "html": "<ul>\n<li>The stitched WAV is now converted to a compressed <strong>MP3</strong> (~64 kbps mono, roughly 6× smaller) right after the WAV is saved, mirroring the PNG→JPEG image-companion pattern. The WAV remains the source of truth for admin/review and regeneration; students stream the MP3.</li>\n<li><strong>Model</strong> (<code>models.py</code>): new <code>GraphicNovelPageAudio.audio_mp3</code> FileField (<code>upload_to=&#x27;graphic_novel_audio_mp3/&#x27;</code>) + a <code>student_audio</code> property returning <code>audio_mp3 or audio</code>. Migration <code>0034_graphicnovelpageaudio_audio_mp3_and_more</code>.</li>\n<li><strong>Encoder</strong> (<code>services/audiobook/encode.py</code>): <code>wav_bytes_to_mp3_bytes()</code> uses <strong><code>lameenc</code></strong> — a pure binary-wheel LAME encoder — <strong>not</strong> ffmpeg/pydub, consistent with the &quot;no ffmpeg/pydub on the box&quot; constraint that already governs the WAV stitcher. Reads rate/width/channels from the WAV header; requires 16-bit PCM. Pinned <code>lameenc==1.8.2</code> in <code>requirements.txt</code>.</li>\n<li><strong>Generator</strong> (<code>services/audiobook/generator.py</code>): <code>_save_mp3_companion()</code> runs after the WAV save <strong>best-effort</strong> — a conversion failure is logged and swallowed, never aborting the WAV (student path falls back to WAV via <code>student_audio</code>). <code>audio_mp3</code> added to the row&#x27;s <code>save(update_fields=...)</code>.</li>\n<li><strong>Student serving</strong> (<code>instructional_service.py</code>): the per-page <code>audio_url</code> in the student payload now resolves via <code>audio.student_audio.url</code> (MP3 preferred). Admin review endpoints unchanged (still serve WAV).</li>\n<li><strong>Backfill</strong>: <code>python manage.py backfill_audio_mp3 [--dry-run]</code> converts existing COMPLETED WAV rows (idempotent; safely skips non-16-bit-PCM-WAV files). Must be run on <strong>production</strong> after deploy + migrate to give existing audio its MP3 companion (until then those pages fall back to WAV).</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li><code>tests/vocabulary/test_audiobook.py</code>: new <code>TestWavToMp3</code> (encode + shrink, empty/non-WAV input raises); <code>test_all_pages_completed</code> now asserts the MP3 companion is produced and <code>student_audio</code> resolves to it. <strong>43 audiobook / 70 audio+instructional tests pass.</strong></li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-07", "note": "audiobook: voice reassignment + slow-pace tag fix", "sections": [{"category": "Changed", "title": "Finalized Hero Voices + Gender-Contrasting Narrator", "html": "<ul>\n<li>Reassigned the prebuilt Gemini TTS voices in <code>services/audiobook/constants.py</code> <code>HERO_VOICES</code>: <strong>Hugo → Achird</strong>, <strong>Amara → Despina</strong>, <strong>Mei → Zephyr</strong> (Leo stays <strong>Puck</strong>). Supersedes the first-draft picks (Amara=Kore, Mei=Fenrir, Hugo=Aoede).</li>\n<li>Replaced the age-band narrator (Sulafat 9yo / Charon 12yo) with a <strong>gender-contrast rule</strong> so the narrator never sounds like a hero: any female hero on the team → male narrator <strong>Charon</strong>; an all-male team → female narrator <strong>Aoede</strong>; unknown/empty team → Aoede default. Implemented as <code>voices.narrator_voice_for(novel)</code>, reading <code>novel.metadata[&#x27;away_team&#x27;]</code> against a new <code>HERO_GENDERS</code> map (Leo/Hugo male, Amara/Mei female, confirmed from the canon cast sheets). New constants <code>NARRATOR_VOICE_MALE</code>/<code>NARRATOR_VOICE_FEMALE</code>/<code>NARRATOR_VOICE_DEFAULT</code>; <code>NARRATOR_VOICE_BY_AGE</code> removed.</li>\n<li>Voices only change on (re)generation — existing WAVs and <code>voice_manifest</code> rows keep their old voices until the page is regenerated.</li>\n</ul>"}, {"category": "Fixed", "title": "Voice Director No Longer Slows Lines Down", "html": "<ul>\n<li>The voice director LLM was tagging some lines with <code>[slowly]</code> (e.g. Amara on &quot;The Flowers That Wake at Night&quot; page 4), which Gemini TTS honors literally and which compounds the already-gentle kid-friendly pacing, making delivery drag.</li>\n<li><strong>Prompt</strong> (<code>prompts/audiobook_voice_director.txt</code>): removed slow-pace tags from the allowed set and added an explicit PACING rule forbidding them (weight should come from emotion tags or the player&#x27;s between-line pauses, never a slow tag).</li>\n<li><strong>Defensive sanitizer</strong> (<code>voice_director.py</code>): <code>_index_directed_events</code> now runs every directed line through <code>_strip_slow_tags()</code>, which removes slow-pace cues (<code>slowly</code>, <code>very slowly</code>, <code>one word at a time</code>, <code>drawn-out</code>, <code>word by word</code>, …) from inline <code>[...]</code> tags — surgically (e.g. <code>[nervously, very slowly]</code> → <code>[nervously]</code>) and dropping a tag entirely if it becomes empty. Runs on the <strong>read path</strong>, so already-cached director output (this novel and any other) is cleaned without re-running the LLM; emotion tags like <code>[amazed]</code> pass through untouched.</li>\n<li>Tests: <code>tests/vocabulary/test_audiobook.py</code> updated for the new narrator rule (female/male/mixed/unknown team cases) — <strong>32 passed</strong>.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-07", "note": "audiobook: fix missing play button on review page", "sections": [{"category": "Fixed", "title": "Admin Review Content Endpoints Now Expose `audio_url`", "html": "<ul>\n<li>After generating read-along audio, the <code>&lt;audio&gt;</code> player did not appear on the Generation Review page (<code>/teacher/generation-jobs/&lt;id&gt;</code>) until audio was re-triggered, even though the WAVs existed on disk. Root cause: <code>GenerationJobContentView</code> and <code>WordSetContentView</code> serialized every graphic-novel page field <strong>except</strong> the audio. The frontend player only renders when <code>audioUrl</code> is truthy, and on initial load that value comes from <code>page.audio_url</code> in the content payload — which was never sent. (The student <code>instructional_service</code> payload already carried <code>audio_url</code>; only the two <strong>admin review</strong> content endpoints were missing it.)</li>\n<li><strong>Backend</strong> (<code>views/generation_views.py</code>): added a shared <code>_graphic_novel_page_review_payload()</code> helper that includes <code>audio_url</code> (the page&#x27;s <code>audio</code> reverse-OneToOne URL when it exists and is <code>COMPLETED</code>, else <code>&#x27;&#x27;</code>); both content endpoints now use it. Added <code>graphic_novels__pages__audio</code> to each endpoint&#x27;s <code>prefetch_related</code> to avoid an N+1 on the audio relation.</li>\n<li><strong>Frontend</strong> (<code>pages/admin/GenerationReview.jsx</code>): seed <code>audioState</code> from the loaded content (<code>seedAudioFromContent</code>) so existing per-page players render on first paint and the novel-level button reads &quot;↺ Regen audio&quot; instead of &quot;🔊 Generate audio&quot; without waiting for a poll.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-07", "note": "audiobook: voice director LLM step", "sections": [{"category": "Added", "title": "Per-Novel Voice Director (LLM-Directed TTS Performance)", "html": "<ul>\n<li>Before synthesis, <code>services/audiobook/voice_director.py</code> makes <strong>one LLM call per novel</strong> (step key <code>audiobook_director</code>, configurable in the LLM Config Matrix). The LLM reads every page&#x27;s speech events and returns (1) a short Audio Profile + Director&#x27;s Notes block per speaker and (2) the full transcript with inline Gemini TTS audio tags (<code>[excitedly]</code>, <code>[whispers]</code>, etc.). Each TTS call then wraps the spoken line in the speaker&#x27;s profile for richer, differentiated per-character performance.</li>\n<li><strong>Caching</strong>: result stored in <code>novel.metadata[&#x27;voice_director&#x27;]</code> — per-page regeneration reuses the cached output without a new LLM call. Graceful degradation: any director failure falls back to the bare transcript text.</li>\n<li><strong>Migration <code>0033_audiobook_director_step_key</code></strong>: adds <code>audiobook_director</code> to <code>LLMStepConfig.StepKey</code> and seeds one row per config set (cloned from <code>gn_final_script</code>). Total step keys: 12.</li>\n<li>Prompt: <code>vocabulary/prompts/audiobook_voice_director.txt</code> (Audio Profile + Director&#x27;s Notes format per the Gemini TTS prompting guide).</li>\n<li><code>generator.generate_novel_audio</code> runs the director once before the synthesis loop; <code>_run_page_audio</code> in views loads the cached direction before single-page regen. <code>generate_page_audio</code> accepts <code>direction=</code> and uses per-speaker profiles as the TTS style prefix.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-07", "note": "audiobook: dedicated TTS endpoint config + verified working", "sections": [{"category": "Fixed", "title": "TTS Routing Uses Dedicated `GEMINI_TTS_*` Settings", "html": "<ul>\n<li>The initial audiobook commit (below) read <code>settings.GEMINI_API_KEY</code>, which is <strong>empty</strong> in this deployment — the real Gemini key lives in the LLM Config Matrix (<code>GEMINI_API_KEY_Vector</code>), and audio modality needs the <strong>native</strong> generateContent API that an OpenAI-compatible text proxy does not serve. First live run failed with &quot;GEMINI_API_KEY is not configured&quot;.</li>\n<li>Added dedicated, independently-configurable settings (<code>config/settings.py</code>, <code>.env.example</code>): <code>GEMINI_TTS_API_KEY</code> (falls back to <code>GEMINI_API_KEY</code>), <code>GEMINI_TTS_BASE_URL</code> (passed into the native <code>genai.Client</code> via <code>HttpOptions(base_url=...)</code>; empty = call Google directly), <code>GEMINI_TTS_MODEL</code> (default <code>gemini-2.5-pro-preview-tts</code>). <code>tts_client._client()</code> builds the client from these.</li>\n<li><strong>Verified working end-to-end</strong>: novel 50 generated 6/6 pages through the Vector TTS proxy; output confirmed PCM 24kHz/16-bit/mono. The phase-1 &quot;manual smoke test still pending&quot; caveat below is now resolved.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-07", "note": "graphic novel: read-along audiobook pipeline, phase 1", "sections": [{"category": "Added", "title": "On-Demand Per-Page Read-Along Audio (Gemini TTS)", "html": "<ul>\n<li>Goal: generate a read-along audio track for a completed graphic novel — <strong>one stitched audio file per page</strong> — on demand, using <code>gemini-2.5-pro-preview-tts</code>. Phase 1 delivers backend generation + storage + admin trigger/poll + serving the URL to students. The production rules live in <code>docs/feature_plan/lexi-legends-audiobook-production-bible.md</code>; the design in <code>docs/feature_plan/audiobook-pipeline-implementation-plan.md</code>.</li>\n<li><strong>Decisions</strong>: separate <strong>on-demand</strong> job (not a 9th pipeline step); <strong>per-event single-voice</strong> TTS calls (one narration box or one dialogue line each), stitched with pauses; no per-event timing metadata yet.</li>\n<li><strong>Model</strong> (<code>models.py</code>): new <code>GraphicNovelPageAudio</code> (OneToOne → <code>GraphicNovelPage</code>): <code>audio</code> (WAV FileField), <code>duration_ms</code>, <code>voice_manifest</code> (per-event voice assignments for debug/regen), <code>status</code> PENDING/RUNNING/COMPLETED/FAILED, <code>attempts</code>, <code>error</code>, timestamps. Migration <code>0032_graphicnovelpageaudio</code>. Kept separate from the page so audio is fully optional/regenerable and never touches image rows.</li>\n<li><strong>Service package</strong> <code>services/audiobook/</code>: <code>constants.py</code> (voice map, age style prefixes, pause timings, PCM format), <code>events.py</code> (<code>build_page_events</code> — pure, walks <code>panel_descriptions</code> into ordered speech events with pauses), <code>voices.py</code> (<code>voice_for</code> — stable hero map + deterministic supporting-pool fallback by name hash; narrator varies by <code>age_band</code>), <code>tts_client.py</code> (isolated native <code>genai.Client</code> TTS call — the project&#x27;s GEMINI_BASE_URL proxy can&#x27;t do audio; parses sample rate from the response mime type; retries once), <code>stitch.py</code> (stdlib <code>wave</code> only — concat PCM + insert silence → one WAV; <strong>no ffmpeg/pydub on the box</strong>), <code>generator.py</code> (<code>generate_page_audio</code> / <code>generate_novel_audio</code> — continue-on-failure per page like the image step; skips the review page and already-COMPLETED pages unless <code>regenerate</code>).</li>\n<li><strong>Source of truth</strong>: spoken text is read verbatim from <code>GraphicNovelPage.panel_descriptions</code> (<code>narration</code> + <code>dialogue[].speaker/.text</code>), confirmed to match the rendered images — no OCR.</li>\n<li><strong>Views/URLs</strong> (<code>generation_views.py</code>, <code>urls.py</code>, admin-only, mirror the async edit-image pattern): <code>POST /api/graphic-novels/&lt;novel_id&gt;/generate-audio/</code> (<code>{regenerate}</code>) → <strong>202</strong> + daemon thread (409 if already RUNNING); <code>GET /api/graphic-novels/&lt;novel_id&gt;/audio-status/</code> poll target (per-page status + URLs); <code>POST /api/graphic-novel-pages/&lt;page_id&gt;/regenerate-audio/</code> for a single page.</li>\n<li><strong>Student serving</strong> (<code>instructional_service.py</code>): each graphic-novel page in the student payload now carries <code>audio_url</code> (the COMPLETED audio&#x27;s URL, else <code>&#x27;&#x27;</code>); added <code>graphic_novels__pages__audio</code> to the prefetch.</li>\n<li><strong>Admin UI</strong> (<code>pages/admin/GenerationReview.jsx</code>, <code>components/generation/GraphicNovelPageEditor.jsx</code>): a &quot;Generate audio&quot; / &quot;Regen audio&quot; button per novel with a 5s status poller, and an <code>&lt;audio controls&gt;</code> player on each page card when audio exists.</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li><code>tests/vocabulary/test_audiobook.py</code> (new, <strong>30 passed</strong>): <code>build_page_events</code> ordering + pause assignment + age-band defaults; <code>voice_for</code> determinism + hero/supporting resolution; <code>stitch_pcm</code>/<code>silence_pcm</code> length math via <code>wave</code> round-trip; generator with a mocked TTS client (all-completed, skip-completed, regenerate, per-page failure isolation); view status codes (202 / 404 / 409 / status poll). Real-key TTS smoke test is manual (documented, not in CI) — the one assumption not verifiable offline (PCM 24kHz/16-bit/mono + voice quality).</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-06", "note": "LLM config: 3 selectable configuration sets", "sections": [{"category": "Added", "title": "Three LLM Config Sets With One Active", "html": "<ul>\n<li>Request: have <strong>3 sets of step configurations</strong>, be able to edit each set independently, and choose which set is active — the pipeline processes generation jobs using the active set&#x27;s configs.</li>\n<li><strong>Model</strong> (<code>models.py</code>): new <code>LLMConfigSet</code> (<code>name</code>, <code>position</code> 1-based unique, <code>is_active</code>). <code>LLMStepConfig</code> gained a <code>config_set</code> FK (CASCADE) and its uniqueness moved from <code>step_key</code> alone to <code>unique_together = (config_set, step_key)</code> — each set holds its own full copy of all 11 step configs.</li>\n<li><strong>Migration</strong> <code>0031_llm_config_sets</code>: creates <code>LLMConfigSet</code>, seeds &quot;Set 1/2/3&quot; (Set 1 active), adds the FK as nullable, attaches pre-existing step configs to Set 1, <strong>clones</strong> them into Sets 2 &amp; 3 (so all three are immediately usable), then makes the FK non-null and swaps in the new unique constraint. Reversible (collapses back to the active/first set&#x27;s rows).</li>\n<li><strong>Single-active</strong> is enforced in application logic (MySQL has no partial unique index): activating one set deactivates the others in the same request, and the API refuses to deactivate the active set.</li>\n<li><strong>Service</strong> (<code>llm_config_service.py</code>): <code>get_step_config(step_key)</code> keeps its signature and now resolves rows from the active set (via new <code>get_active_set()</code>), so the orchestrator and all graphic-novel substep callers needed <strong>zero</strong> changes. Switching the active set takes effect on the next job/step (5-min cache, invalidated on any edit/activation).</li>\n<li><strong>API</strong> (<code>llm_config_views.py</code>, <code>urls.py</code>): <code>GET /api/admin/llm-config-sets/</code> lists sets; <code>PUT /api/admin/llm-config-sets/&lt;id&gt;/</code> renames (<code>name</code>) and/or activates (<code>is_active: true</code>). Step-config GET/PUT are now set-scoped via <code>?set=&lt;id&gt;</code> (default = active set) and return <code>{set, configs}</code> instead of a bare list. Sites stay shared across sets. No create/delete (fixed at 3).</li>\n<li><strong>Frontend</strong> (<code>pages/admin/LLMConfig.jsx</code>): the Step Configuration tab gained a set selector, an inline rename, and a &quot;Make this set active&quot; button; &quot;Save All&quot; writes to the currently selected set. The API Sites tab is unchanged.</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li><code>tests/vocabulary/test_llm_config_sets.py</code> (new, <strong>11 passed</strong>): set listing + admin-only guard, activate-deactivates-others, refuse-deactivate-active, rename, set-scoped GET (default active + explicit <code>?set=</code>), set-scoped PUT isolation (editing one set leaves others untouched), invalid-site rejection, and the service reading/following the active set. Fixture clears seeded LLM rows first (the data migration seeds 3 sets into the test DB). Full backend suite: <strong>408 passed</strong> pre-existing + 11 new.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-06", "note": "graphic novel: admin can redraw a page image", "sections": [{"category": "Added", "title": "\"Redraw\" Button Replays the Original Generation Payload", "html": "<ul>\n<li>Request: a button next to &quot;Edit image&quot; that re-runs a page&#x27;s image with <strong>exactly the same payload as the first generation attempt</strong> — sometimes a second roll of the identical prompt clears artifacts in a bad image.</li>\n<li><strong>Redraw ≠ edit.</strong> Edit feeds *this* page&#x27;s own image plus an admin instruction into <code>images.edit</code>. Redraw rebuilds the page&#x27;s *original generation* payload: the template-built prompt + the previous page as the continuity reference (<code>None</code> for page 1).</li>\n<li><strong>Refactor</strong> (<code>services/generation/graphic_novel_images.py</code>): extracted <code>build_page_image_prompt(page)</code> (the review/normal-page prompt construction, formerly inline in <code>_step_graphic_novel_images</code>) and added <code>previous_page_reference_bytes(page)</code> (mirrors the pipeline&#x27;s per-novel continuity reference). The image step now calls <code>build_page_image_prompt</code>, so the pipeline and redraw build the identical prompt — no behavior change to generation.</li>\n<li><strong>View</strong> (<code>generation_views.RedrawGraphicNovelPageImageView</code>, <code>POST /api/graphic-novel-pages/&lt;page_id&gt;/redraw-image/</code>, admin-only, no body): validates (404 missing / 409 already RUNNING / 400 no image yet), builds the prompt + reads the previous-page reference <strong>synchronously</strong> (fail fast), sets the page <code>RUNNING</code>, hands the slow call to a daemon <code>threading.Thread</code>, returns <strong>202</strong>.</li>\n<li><strong>Worker</strong> (<code>generation_views._run_page_image_redraw(page_id, prompt, reference_bytes)</code>): same shape as <code>_run_page_image_edit</code> — saves <code>edited_image</code> (+ best-effort JPEG companion), <code>use_edited_image=True</code>, appends <code>[REDRAW]</code> to <code>prompt_used</code>, status <code>COMPLETED</code>; on failure status <code>FAILED</code> + <code>generation_error</code>. Original <code>image</code> never overwritten; reversible via <code>select-image/</code>.</li>\n<li><strong>Poll</strong>: reuses the existing <code>GET .../image-status/</code> endpoint (no new poll route).</li>\n<li><strong>Frontend</strong> (<code>GraphicNovelPageEditor.jsx</code>): a &quot;Redraw&quot; button beside &quot;Edit image&quot;; the edit flow&#x27;s poll loop was extracted into a shared <code>pollUntilDone()</code> helper used by both edit and redraw.</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li><code>test_views.py</code>: added redraw coverage alongside the edit tests — 202 + <code>RUNNING</code> + worker args (asserts <code>None</code> reference for page 1), worker COMPLETED save into <code>edited_image</code> (original preserved, <code>[REDRAW]</code> tag), worker FAILED path, 409-when-running, 404-missing-page, 400-no-image, 403-for-student. Full <code>TestGenerationViews</code> class: <strong>32 passed</strong>.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-06", "note": "graphic novel: page image editing is now asynchronous", "sections": [{"category": "Changed", "title": "Edit-Image No Longer Holds a Worker for the Image Call", "html": "<ul>\n<li>Request: stop the <code>edit-image/</code> endpoint from occupying a gunicorn worker for the ~30-60s OpenAI <code>images.edit</code> wait (only 3 workers in production, so two concurrent edits + traffic could starve the pool). Mirrors the existing async pattern used by <code>run-pipeline</code> / <code>resume</code> / <code>restart-substep</code>.</li>\n<li><strong>View</strong> (<code>generation_views.py</code>): <code>EditGraphicNovelPageImageView.post</code> now validates the prompt, looks up the page, reads the reference image bytes synchronously (so an unreadable file still fails fast with 404), sets the page <code>generation_status=RUNNING</code> (+ <code>generation_started_at</code>, bumps <code>generation_attempts</code>, clears the error), and hands the slow image call to a daemon <code>threading.Thread</code>. Returns <strong>202</strong> with the <code>RUNNING</code> payload. Returns <strong>409</strong> if an edit is already <code>RUNNING</code> for the page.</li>\n<li><strong>Worker</strong> (<code>generation_views._run_page_image_edit(page_id, edit_prompt, reference_bytes)</code>): module-level function holding the moved OpenAI call + file-save logic. Wrapped in <code>_close_old_connections_if_safe()</code> so it doesn&#x27;t pin a MySQL connection during the wait. On success: saves <code>edited_image</code> (+ best-effort JPEG companion), <code>use_edited_image=True</code>, appends <code>[ADMIN EDIT]</code> to <code>prompt_used</code>, status <code>COMPLETED</code>. On failure: status <code>FAILED</code> + <code>generation_error</code> (no more 502 — the admin sees the error via polling).</li>\n<li><strong>Poll endpoint</strong> <code>GET /api/graphic-novel-pages/&lt;page_id&gt;/image-status/</code> (<code>GraphicNovelPageImageStatusView</code>, admin-only): returns the standard page image payload for the frontend to poll.</li>\n<li><strong>Frontend</strong> (<code>GraphicNovelPageEditor.jsx</code>): after the POST returns, polls <code>image-status/</code> every <strong>10s</strong> (<code>EDIT_POLL_INTERVAL</code>) until <code>generation_status</code> leaves <code>RUNNING</code>; on <code>COMPLETED</code> merges the result with cache-busted URLs and switches preview to edited, on <code>FAILED</code> surfaces <code>generation_error</code>. The card stays in a busy state with a &quot;you can leave this page; the edit keeps running&quot; hint, and the interval is cleared on unmount. <code>select-image/</code> is unchanged (synchronous instant DB flip).</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li><code>test_views.py</code>: reworked the edit-image tests — happy path now patches <code>threading.Thread</code> and asserts 202 + <code>RUNNING</code> + worker args; new tests drive <code>_run_page_image_edit</code> directly for the COMPLETED save and the FAILED path; added 409-when-already-running and <code>image-status/</code> (200 + 403-for-student) tests. The select-back-to-original test now seeds the edited variant via the worker.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-05", "note": "graphic novel: page count is deterministic from pack word count", "sections": [{"category": "Changed", "title": "Page Count No Longer an LLM Judgment; Derived From Word Count", "html": "<ul>\n<li>Request: make graphic novel length a fixed function of pack size — <strong>≤4 words → 5 pages, &gt;4 words → 6 pages</strong> — instead of letting the router LLM choose per premise. Supersedes the 2026-06-04 length-bias rebalance below (the LLM no longer picks length, so the scorer-bias problem that prompted it no longer exists).</li>\n<li><strong>Constants</strong> (<code>services/generation/constants.py</code>): added <code>GRAPHIC_NOVEL_WORD_COUNT_PAGE_THRESHOLD = 4</code> and <code>page_count_for_word_count(word_count)</code> (returns 6 if <code>word_count &gt; threshold</code>, else 5), mirroring the existing <code>max_locations_for_page_count</code> pattern.</li>\n<li><strong>Script step</strong> (<code>services/generation/graphic_novel_script.py</code>): both <code>_step_graphic_novel_script</code> and <code>restart_graphic_novel_from_substep</code> compute <code>required_page_count = page_count_for_word_count(len(pack_words_data))</code>, thread it into <code>base_input</code> + <code>input_summary</code> (so the router/scorer/cloze/beat/final prompts see it), and then <strong>force</strong> <code>winning_premise[&#x27;page_count&#x27;] = required_page_count</code> regardless of what the model returned (the LLM&#x27;s declared value is logged and overridden, never trusted). All downstream logic — template dispatch, <code>expected_page_count</code>, location ceilings — already keys off this single value, so forcing it is sufficient.</li>\n<li><strong>Router prompt</strong> (<code>graphic_novel_router.txt</code>): the page-count section now states the length is fixed (<code>required_page_count</code>, given in the input, derived from word count); every premise must use it and size its plot to fit. Location budget made page-count-aware (≤2 for 5-page, ≤3 for 6-page).</li>\n<li><strong>Scorer prompt</strong> (<code>graphic_novel_premise_scorer.txt</code>): replaced the &quot;page length is neutral / prefer the shorter premise&quot; comparison block (all premises now share one fixed length) with guidance to judge how well each uses that shared length; penalizes a premise that declares a <code>page_count</code> differing from <code>required_page_count</code>.</li>\n<li><strong>Design choice</strong>: the Python override is the deterministic safety net — no new validator rejection path — so LLM disobedience cannot break the rule. Consistent with &quot;reserve hard limits for measurable constraints, enforce in code&quot; ([feedback_prompt-flexibility]).</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li><code>test_step_graphic_novel_script.py</code>: new <code>TestPageCountForWordCount</code> (boundaries 4→5, 5→6); reworked the 6-page dispatch test to drive it with a <strong>5-word pack</strong> (the only way to force 6 pages now), using new multiword fixtures; the 5-page dispatch test (2-word pack) renamed to reflect word-count-driven selection.</li>\n<li><code>generation_fixtures.py</code>: added <code>MULTIWORD_TERMS</code> / <code>MULTIWORD_LOOKUP_RESPONSE</code> and <code>build_multiword_cloze_response</code> / <code>build_multiword_six_page_beat_response</code> / <code>build_multiword_six_page_script_response</code> (cover all 5 terms in cloze, vocab_roles, page text, and vocab_anchors so the 6-page validators pass).</li>\n<li>Full vocabulary suite <strong>380 passed</strong>.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-05", "note": "graphic novel: per-pack substep resume + no orphaned packs on restart", "sections": [{"category": "Fixed", "title": "Resuming a Mid-Pack Script Failure Restarted From Team Selection", "html": "<ul>\n<li>Symptom: when a graphic novel substep failed (e.g. premise scoring) and the admin clicked Resume, the pipeline re-ran that pack&#x27;s GRAPHIC_NOVEL_SCRIPT step from the first substep (Team Selection), wasting LLM calls and producing a different story than the partially-completed run.</li>\n<li><strong>Root cause</strong>: the per-pack <code>GraphicNovel</code> record is created only after all 6 substeps succeed, so <code>last_completed_step</code> never advances to GRAPHIC_NOVEL_SCRIPT and the per-pack loop had no substep-level memory — it always started at substep 0.</li>\n<li><strong>Fix</strong> (<code>services/generation/graphic_novel_script.py</code>): <code>_step_graphic_novel_script</code> now computes <code>_resume_substep_index_for_pack(job, pack)</code> — the first substep without a COMPLETED log for that pack — and, when prior substep artifacts exist on disk, delegates to the existing <code>restart_graphic_novel_from_substep(...)</code> to resume from there. A fresh pack (nothing completed) still runs the full 6-call workflow from Team Selection. The COMPLETED log (not artifact presence) is authoritative, because <code>_run_graphic_novel_substep</code> writes the artifact *before* validation — a validation failure can leave a stale artifact without a COMPLETED log. No DB field, model, or migration change.</li>\n</ul>"}, {"category": "Fixed", "title": "Per-Pack Substep Restart Orphaned Later Packs (job #48)", "html": "<ul>\n<li>Symptom (job #48, &quot;To Drill or Not to Drill?&quot;): the word set had two packs; only one graphic novel was created and the job was marked COMPLETED. Pack 53 (&quot;Gas Crisis, Endless Sprawl&quot;) had no novel at all.</li>\n<li><strong>Root cause</strong>: pack 52&#x27;s beat-sheet substep failed, so the GRAPHIC_NOVEL_SCRIPT step raised before pack 53 ever started. The admin then used the per-substep restart (↻) on pack 52, and <code>restart_graphic_novel_substep</code> (<code>services/generation/orchestrator.py</code>) regenerated <strong>only pack 52</strong> and then unconditionally marked the <strong>whole job</strong> COMPLETED. A subsequent &quot;Restart Step → Graphic Novel Images&quot; only saw pack 52&#x27;s novel and also completed. Pack 53 was silently dropped.</li>\n<li><strong>Fix</strong> (<code>services/generation/orchestrator.py</code>): after the targeted single-pack restart, <code>restart_graphic_novel_substep</code> now runs <code>_step_graphic_novel_script(job, remaining_packs, words_data)</code> over <strong>all</strong> packs in the word set before marking COMPLETED. The script step&#x27;s skip-guard leaves packs that already have a novel with pages untouched, so complete packs cost no extra LLM calls; only genuine gaps (like pack 53) are filled. If a remaining pack fails, the step raises and the job is correctly marked FAILED. The image step was already correct (queries <code>novel__pack__in=packs</code> and fails on any incomplete page), so the gap was purely script-side.</li>\n<li><strong>Note</strong>: the code fix stands; job #48&#x27;s stale data was intentionally left as-is (re-running any pack 52 substep restart, or a script-step restart, will now also generate pack 53&#x27;s novel — then run images).</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li><code>test_step_graphic_novel_script.py</code>: <code>TestStepGraphicNovelScriptResume</code> (resume from a failed <code>premise_scoring</code> makes exactly 4 follow-on LLM calls reusing team/router from disk and reproduces the saved <code>away_team</code>; a fresh pack still runs all 6 substeps).</li>\n<li><code>test_orchestrator.py</code>: <code>TestRestartGraphicNovelSubstep</code> (a per-pack restart runs the full script step over both packs so the second is not orphaned; a failing remaining-pack script marks the job FAILED).</li>\n<li>Combined orchestrator + GN-script suites: <strong>42 passed</strong>.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-05", "note": "generation: honest retry display + batch-resumable question generation", "sections": [{"category": "Fixed", "title": "Job Status Showed a False \"Question Generation Error\" While Still Retrying", "html": "<ul>\n<li>Symptom (job 48): the GenerationReview page rendered Question Generation as ✗ FAILED with a red &quot;Error&quot; while the backend pipeline was still running and recovering on the fallback site. The job was genuinely <code>RUNNING</code>; the display lied.</li>\n<li><strong>Root cause</strong>: the orchestrator writes a transient <code>FAILED</code> <code>GenerationJobLog</code> on every recoverable retry attempt (the per-step attempt plan is <code>[primary, primary, fallback]</code>), and <code>last_completed_step</code> only advances after a step *fully* succeeds. The frontend (<code>GenerationJobStatus.jsx</code>) keyed each step&#x27;s status on the *latest* log for that step, so a step mid-retry showed its last transient failure as if it were terminal.</li>\n<li><strong>Backend</strong> (<code>services/generation/orchestrator.py</code>): new <code>_build_retry_payload(plan, failed_idx)</code> counts attempts *per site role* and writes structured fields (<code>failed_attempt</code>, <code>failed_site_role</code>, <code>next_attempt</code>, <code>next_site_role</code>, <code>failed_model</code>, <code>next_model</code>) plus a ready-made <code>retry_message</code> into the retry marker&#x27;s <code>output_data</code> (the logs API exposes <code>output_data</code>, not <code>input_data</code>). Messages read e.g. &quot;Attempt 1 on primary site (…) failed; retrying — attempt 2 on primary site (…).&quot; and &quot;…attempt 1 on fallback site (…)&quot;.</li>\n<li><strong>Frontend</strong> (<code>GenerationJobStatus.jsx</code>): the active step is now derived from the authoritative <code>job.status</code> + <code>last_completed_step</code> (the step right after the last completed one) instead of the latest per-step log. While the job is RUNNING/PENDING that step renders RUNNING with an amber &quot;Retrying&quot; line showing <code>retry_message</code>; a red &quot;Error&quot; only shows for a genuinely terminal FAILED step.</li>\n</ul>"}, {"category": "Added", "title": "Question Generation Resumes at Batch Granularity (no wasted calls, no duplicates)", "html": "<ul>\n<li>Request: when a question-generation run fails partway, the batches that already returned valid questions should stay in the DB, and resuming the job should skip those words instead of regenerating them.</li>\n<li><code>_step_generate_questions</code> (<code>services/generation/step_questions.py</code>) is now idempotent per batch. Questions already commit per-batch (no transaction wraps the step), so the gap was only that resume/in-step-retry reran *all* batches — wasting LLM calls and creating duplicate questions for already-done words. The step now reads the job&#x27;s existing <code>Question.word_id</code> set up front: a batch whose words are all present is <strong>skipped</strong>; a batch with only some words present (a partial prior attempt) has those stale rows deleted before regenerating. <code>questions_created</code> is recomputed as the job&#x27;s total count, and the COMPLETED log records <code>batches_skipped</code>.</li>\n<li>Composes with all entry paths: fresh <code>run_full_pipeline</code> (empty set → generate all), <code>resume_pipeline</code> and the in-step <code>[primary, primary, fallback]</code> retry (skip completed, finish the rest), and <code>restart_pipeline_from_step</code> for QUESTION_GEN which still deletes all questions first for an intentional full regen.</li>\n</ul>"}, {"category": "Docs", "title": "", "html": "<ul>\n<li>Corrected stale facts in <code>PROJECT_CONTEXT.md</code> and <code>CLAUDE.md</code>: question batch size is <strong>2</strong> words per call (code: <code>QUESTION_BATCH_SIZE = 2</code>), not 3; admin status polling interval is <strong>30 s</strong> (<code>POLL_INTERVAL = 30000</code>), not 10 s.</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li>Added 3 orchestrator tests (<code>test_orchestrator.py</code>) for <code>_build_retry_payload</code> (per-role attempt counting, role-less image plan, logged retry message) and 3 question-step tests (<code>test_step_questions.py</code>: failed batch persists earlier batches, resume skips completed batches with no duplicates, counter/<code>batches_skipped</code> reflect totals). Full vocabulary suite <strong>369 passed</strong>.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-04", "note": "graphic novel: page-count length bias rebalance", "sections": [{"category": "Changed", "title": "Stop the Scorer From Always Picking 6-Page Premises", "html": "<ul>\n<li>Investigation: on recent real-content runs the pipeline produced a 6-page graphic novel (+ review sheet) every time, never 5. Tracing the on-disk artifacts (router/scorer/beat/script JSON in <code>temp/generation_artifacts/</code>) confirmed the mechanism is sound — the winning premise&#x27;s <code>page_count</code> flows correctly through to the beat sheet and final script in every run. The bias was in the <strong>scoring rubric</strong>, not the code: whenever a premise declared 6 pages, the scorer swept it 5/5/5/5/5 across all dimensions (vs 3s–4s for 5-page premises), because the extra page carried a richer plot and the rubric implicitly rewarded &quot;more story&quot; as higher narrative_clarity / visual_potential / pedagogical_clarity. The router also leaned toward writing its strongest idea at 6 pages.</li>\n<li><strong>Router</strong> (<code>graphic_novel_router.txt</code>): added two soft nudges to the page-count section — frames 5 pages as the strong default for ESL readers (less text per page → easier word inference, 6 reserved for premises that genuinely need the room), and asks for a real mix across the 3 premises with at least one conceived as a clean 5-page story (not a trimmed-down 6-page idea) so the scorer has a strong short option to choose.</li>\n<li><strong>Scorer</strong> (<code>graphic_novel_premise_scorer.txt</code>): added a &quot;Page length is neutral, not a quality signal&quot; block — page count is a self-chosen constraint, not a dimension to reward; judge each premise against what it attempts at its own length (a tight 5-page story is not &quot;thin&quot;); a more ambitious plot is only better if it still teaches every target word clearly; and a tiebreaker preferring the shorter premise when two are close.</li>\n<li>Phrasing follows the soft-guidance convention (prefer/default/aim, no hard mandates).</li>\n<li><strong>Scope</strong>: prompt-text only — no Python, validator, or schema changes. Affects <strong>new</strong> generations only. The real test is the next few runs; expect the mix of 5- and 6-page novels to return.</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li>No new tests. The 28 script-step tests mock prompt loading and assert template selection (5- vs 6-page), not prompt content — all 28 pass.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-04", "note": "graphic novel: re-establishing caption on location change", "sections": [{"category": "Changed", "title": "Bridge Magical/Instant Scene Changes with an Arrival Caption", "html": "<ul>\n<li>Reviewing job 47 / &quot;The Empty Case&quot; surfaced an awkward page 1 → page 2 transition: Amara teleports from the Vault to the community garden via the glowing leaf-tile, but page 2 opens in the garden with nothing telling the reader how she got there. For 8–14 ESL readers, an uninferable cut spends attention on &quot;wait, how did she get here?&quot; instead of on the vocab word.</li>\n<li><strong>Final-script prompts</strong> (<code>graphic_novel_script.txt</code> + <code>graphic_novel_script_6page.txt</code>): extended the existing page-1 establishing-panel rule into a conditional <strong>&quot;re-establish on location change&quot;</strong> rule. When a page&#x27;s location differs from the previous page <strong>and</strong> the reader can&#x27;t infer the move by simple physical walking (a magical/instant transition like the leaf-tile, or a jump to a far/unrelated place), the page&#x27;s first panel must open with one short caption re-establishing WHERE we are now and HOW the character arrived. Ordinary walkable moves in the same setting (classroom → hallway, kitchen → backyard) get <strong>no</strong> caption, so the 80-word page budget isn&#x27;t wasted on redundancy. The decision test written into the prompt: *&quot;could a reader assume the character just walked there?&quot;* Caption wording is left open to the model — no canned template. A matching item was added to each prompt&#x27;s self-check list.</li>\n<li><strong>Beat-sheet prompts</strong> (<code>graphic_novel_beat_sheet.txt</code> + <code>..._6page.txt</code>): added a planning nudge tied to the per-page <code>setting_key</code> the beat sheet already tracks — when a page&#x27;s <code>setting_key</code> differs from the prior page&#x27;s via such a transition, note an arrival moment in <code>why_this_page_matters</code> so the script step has a planned beat to anchor the caption on.</li>\n<li><strong>Scope</strong>: prompt-text only — no Python, validator, or schema changes. Affects <strong>new</strong> generations only; the existing job-47 novel needs its GRAPHIC_NOVEL_SCRIPT step re-run + page re-render (or a manual per-page image edit) to gain the caption.</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li>No new tests. The 28 existing script-step tests mock prompt loading and assert which template (5- vs 6-page) is selected, not prompt content, so they&#x27;re unaffected — all 28 pass.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-06-01", "note": "secondary character anchors never worked — bug fix", "sections": [{"category": "Fixed", "title": "Secondary Character Anchors Were Silently Dropped", "html": "<ul>\n<li>The secondary-character visual anchor feature (added 2026-05-28) had <strong>never produced a single stored anchor</strong>. Symptom that surfaced it: in job 46 / novel 40 (&quot;The Muddy Rescue&quot;), the secondary kid Toby drifted from a blue shirt on page 1 to a red shirt on page 6 — exactly the drift anchors exist to prevent.</li>\n<li><strong>Root cause</strong>: the shared LLM wrappers (<code>call_gemini</code>, <code>call_anthropic</code>, and the OpenAI-compatible proxy path) <strong>always force JSON mode</strong> (<code>response_format={&#x27;type&#x27;:&#x27;json_object&#x27;}</code>) and return a <strong>parsed dict</strong>, never a string. But <code>_generate_secondary_character_anchors</code> asked the model for &quot;plain text, no JSON&quot; and called <code>anchor_text.strip()</code> — raising <code>AttributeError: &#x27;dict&#x27; object has no attribute &#x27;strip&#x27;</code>. A broad <code>except Exception</code> swallowed it, logged a warning, and returned <code>{}</code>, so <code>novel.metadata[&#x27;secondary_character_anchors&#x27;]</code> was never written and every qualifying secondary character fell back to its bare script description (often missing outfit colors → image-model drift).</li>\n<li><strong>Fix</strong> (<code>graphic_novel_helpers.py</code>): new <code>_format_anchor_design_lock(anchor_data) -&gt; str</code> renders the dict&#x27;s design-lock sections into a stable <code>KEY: value</code> text block (canonical order: AGE_AND_BODY, FACE_AND_HAIR, OUTFIT_LOCK, COLOR_PRIORITY, NEGATIVE_LOCK), passes a plain string through unchanged (defensive), and returns <code>&#x27;&#x27;</code> for unexpected types. The consumer now formats the response, stores non-trivial anchors, and logs a warning (instead of crashing) when an anchor is empty/too short.</li>\n<li><strong>Prompt</strong> (<code>prompts/secondary_character_anchor.txt</code>): rewritten to request a <strong>JSON object</strong> with the five named string fields, matching what the wrapper actually returns, instead of &quot;plain text, no JSON&quot;.</li>\n<li><strong>Scope</strong>: fix affects <strong>new</strong> generation only. Existing novels rendered with drift (e.g. novel 40) need the GRAPHIC_NOVEL_SCRIPT step re-run for the pack (repopulates the anchor into metadata) followed by page-image regeneration.</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li>Added <code>TestFormatAnchorDesignLock</code> (4 cases: dict rendering + section order, plain-string passthrough, unexpected-type → <code>&#x27;&#x27;</code>, blank-section skipping) and <code>TestGenerateSecondaryCharacterAnchors</code> (2 cases: dict response → stored anchor regression, LLM failure → no raise) in <code>test_step_graphic_novel_script.py</code>.</li>\n<li>Full backend suite <strong>379 passed</strong>.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-31", "note": "low-hanging-fruit cleanup: media, indexes, dedup, UX", "sections": [{"category": "Chore", "title": "Stop Tracking Generated Media in Git", "html": "<ul>\n<li><code>backend/media/</code> held 396 generated files (AI page images + LLM output logs, ~893 MB) committed to the repo, bloating clones and every diff. Untracked the whole tree via <code>git rm -r --cached backend/media</code> (files stay on disk) and added it to the root <code>.gitignore</code>, keeping the two subdirectories (<code>generated_images/</code>, <code>graphic_novels/</code>) via <code>.gitkeep</code> so Django still has somewhere to write on a fresh clone.</li>\n<li>Note: this stops *future* growth only. The ~893 MB still lives in git history; reclaiming it needs a history rewrite (<code>git filter-repo</code>), deferred as a separate, more disruptive operation.</li>\n</ul>"}, {"category": "Perf", "title": "Indexes on Hot Query Paths", "html": "<ul>\n<li>Added composite indexes (migration <code>0030_useranswer_..._idx_and_more</code>) on the two most-queried models:</li>\n<ul>\n<li><code>UserWordProgress</code>: <code>(user, next_review_at)</code> for the &quot;due for review&quot; practice/dashboard query, and <code>(user, instructional_status)</code> for READY/PENDING filtering.</li>\n<li><code>UserAnswer</code> (previously had no indexes): <code>(user, answered_at)</code> for activity/accuracy queries, <code>(user, is_correct)</code> for frequent-mistakes/challenging-words, and <code>(question, answered_at)</code> for per-word answer history (struggle-word detection).</li>\n</ul>\n<li>Closes the <code>UserWordProgress</code> + <code>UserAnswer</code> portion of BETA_IMPROVEMENTS item #6. <code>Question.word</code> index remains pending.</li>\n</ul>"}, {"category": "Refactor", "title": "Dedup Definition-Translation Lookup", "html": "<ul>\n<li>Three services (<code>dashboard_service</code>, <code>practice_service</code>, <code>instructional_service</code>) each carried a near-identical private <code>_get_translation</code> / <code>_get_translations_for_primer</code> doing the same ContentType + Translation lookup. Consolidated into <code>vocabulary/utils.py</code>: <code>get_definition_translations(word, language, fields=(...))</code> (returns a dict of field→translated string) and the single-field wrapper <code>get_definition_translation(word, language)</code>. Removed the now-unused <code>ContentType</code> / <code>Translation</code> / <code>WordDefinition</code> imports from the affected services.</li>\n</ul>"}, {"category": "Fixed", "title": "Replace Blocking alert() Calls with Inline UI", "html": "<ul>\n<li>Swapped the five native <code>alert()</code> dialogs in the teacher flows for inline error/success banners using the existing <code>t-message</code> styles:</li>\n<ul>\n<li><code>GroupManagementView</code>: save/delete errors now render in a banner (no more raw <code>JSON.stringify</code> dump).</li>\n<li><code>GroupFormModal</code>: name-required validation shows inline.</li>\n<li><code>CommandCenter</code> + <code>StudentFormModal</code>: save errors propagate into the modal&#x27;s existing error slot (the parent handler re-throws; the modal catches).</li>\n<li><code>BulkStudentFormModal</code>: success shows an inline banner and auto-closes after a short delay instead of a blocking alert.</li>\n</ul>\n</ul>"}, {"category": "Docs", "title": "", "html": "<ul>\n<li><code>manage.py check</code> clean; full backend suite <strong>373 passed</strong>; frontend <code>npm run build</code> compiles clean.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-31", "note": "student-facing JPEG page images", "sections": [{"category": "Added", "title": "Lightweight JPEG Companions for Students", "html": "<ul>\n<li>Graphic novel page PNGs average ~3.3 MB each, which is slow to load over mobile data. Every page now gets a smaller JPEG companion (~0.5 MB, ~15% of the PNG — measured 287 MB → 42.6 MB across 85 existing pages) that <strong>students</strong> load instead. The PNG stays the source of truth for admins, image editing, and cross-page style continuity.</li>\n<li><strong>Model</strong> (<code>GraphicNovelPage</code>): new <code>image_jpeg</code> and <code>edited_image_jpeg</code> ImageFields mirroring <code>image</code> / <code>edited_image</code>, plus a <code>student_image</code> property that returns the JPEG of the currently displayed variant, falling back to that variant&#x27;s PNG when no JPEG exists. Migration <code>0029_graphicnovelpage_edited_image_jpeg_and_more</code>.</li>\n<li><strong>Conversion helper</strong> (<code>vocabulary/services/image_utils.py</code>, new): <code>png_to_jpeg_bytes(png_bytes, quality=85)</code> opens with Pillow, flattens any alpha onto white, converts to RGB, and writes an optimized JPEG. Pillow is now a <strong>runtime</strong> dependency (added to <code>requirements.txt</code>; it was previously dev-only).</li>\n<li><strong>JPEG written alongside every PNG save</strong>, all best-effort (a conversion failure never aborts PNG generation): the generation pipeline (<code>graphic_novel_images.py</code>, both the main and retry save blocks), the admin edit-image view (<code>edited_image_jpeg</code>), and a skip-path backfill (<code>backfill_page_jpegs</code>) that fills missing JPEGs when a job resumes over already-rendered pages.</li>\n<li><strong>Only the student read path changed</strong>: <code>instructional_service.py</code> now serves <code>student_image</code>. All admin payloads (review/status/content views, edit/select endpoints) still serve the PNG via <code>display_image</code>. The student reader (<code>GraphicNovelReader.jsx</code>) needed no change — it already reads <code>image_url</code>. The <code>select-image</code> endpoint needs no file work since both JPEGs already exist; it just flips <code>use_edited_image</code>.</li>\n<li><strong>Backfill command</strong> (<code>vocabulary/management/commands/backfill_jpeg_images.py</code>, new): idempotent, <code>--dry-run</code> supported. Converts every page that has a PNG but no matching JPEG. Pages whose PNG file is missing from disk are skipped (not errors).</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li>12 new tests (<code>tests/vocabulary/test_jpeg_companion.py</code>): PNG→JPEG conversion (RGBA flatten, RGB passthrough, size reduction, invalid-input errors), <code>student_image</code> variant selection + PNG fallback, backfill idempotency, and the generation pipeline saving a JPEG companion. Full suite: 373 passed.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-31", "note": "admin per-page image editing + variant selection", "sections": [{"category": "Added", "title": "Edit & Choose Graphic Novel Page Images", "html": "<ul>\n<li>Admins can now refine any single graphic novel page image from the GenerationReview screen, without re-running the pipeline.</li>\n<li><strong>Edit endpoint</strong> <code>POST /api/graphic-novel-pages/&lt;page_id&gt;/edit-image/</code> (admin-only): takes <code>{&quot;prompt&quot;: &quot;...&quot;}</code>, re-renders the page through OpenAI&#x27;s existing <code>images.edit</code> path (the same call used for cross-page style continuity), passing the <strong>currently displayed</strong> image as the visual reference. Synchronous (~30-60s, one billed GPT-Image-2 call). Returns both variant URLs + which is active.</li>\n<li><strong>Select endpoint</st
