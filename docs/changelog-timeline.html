rong> <code>POST /api/graphic-novel-pages/&lt;page_id&gt;/select-image/</code> with <code>{&quot;variant&quot;: &quot;original&quot;｜&quot;edited&quot;}</code> (admin-only): flips which stored variant is shown. Reversible; validates an edited image exists before selecting it.</li>\n<li><strong>Model</strong> (<code>GraphicNovelPage</code>): new <code>edited_image</code> (ImageField) and <code>use_edited_image</code> (Boolean) fields, plus <code>display_image</code> and <code>has_edited_image</code> properties. <strong>The original <code>image</code> is never overwritten</strong> — edits land in <code>edited_image</code>. Migration <code>0028_graphicnovelpage_edited_image_and_more</code>.</li>\n<li><strong>Read paths updated to <code>display_image</code></strong> so the admin&#x27;s choice propagates everywhere: student instructional flow (<code>instructional_service.py</code>), both content serializers + the per-page status helper (<code>generation_views.py</code>), and the pipeline&#x27;s cross-page continuity reference (<code>graphic_novel_images.py</code>).</li>\n<li><strong>Frontend</strong> (<code>GraphicNovelPageEditor.jsx</code>, new): per-page card with an edit-prompt box and an Original/Edited variant picker (✓ marks the live variant). <code>GenerationReview.jsx</code> renders it and merges edited pages back into state with cache-busted image URLs.</li>\n</ul>"}, {"category": "Added", "title": "Click-to-Zoom Page Thumbnails", "html": "<ul>\n<li>On the GenerationReview Packs tab, graphic novel page thumbnails are now clickable. Clicking opens a fullscreen lightbox showing the currently previewed variant (original/edited) at full size, so admins can inspect detail that is hard to judge from the small thumbnail. Closes on backdrop click, the × button, or Escape. Implemented as a local <code>ImageLightbox</code> component inside <code>GraphicNovelPageEditor.jsx</code> — no new route, API, or shared CSS.</li>\n</ul>"}, {"category": "Chore", "title": "Repository Hygiene", "html": "<ul>\n<li>Added a root <code>.gitignore</code> covering <code>temp/</code>, <code>tmp/</code>, machine-local Claude settings (<code>.claude/settings.local.json</code>), and standard Python/Node build output. Removed the 67 previously tracked <code>temp/llm_logs</code> files and <code>.claude/settings.local.json</code> from version control (kept on disk) so generated LLM logs and per-developer state stop polluting history.</li>\n</ul>"}, {"category": "Fixed", "title": "Stale-Job Timeout Detection Test", "html": "<ul>\n<li><code>test_stale_running_job_marks_running_graphic_page_failed</code> set job activity to 20 minutes ago, but <code>STALE_JOB_THRESHOLD_SECONDS</code> is 1800 (30 min), so the job correctly stayed RUNNING and the assertion failed. This is the &quot;1 pre-existing unrelated failure&quot; referenced in prior changelog entries. Bumped the test&#x27;s log/page timestamps to 31 minutes so they&#x27;re past the threshold. The view code was correct; only the test timing was wrong.</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li>5 new edit/select endpoint tests (success preserves original + stores edit, variant round-trip, select-edited-without-edit 400, unknown-variant 400, student-forbidden 403). Full <code>TestGenerationViews</code> + <code>TestInstructionalPackView</code> suites pass with no remaining known failures.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-30", "note": "admin UI pipeline-order sync", "sections": [{"category": "Fixed", "title": "Admin Views Now Reflect Current Pipeline Order", "html": "<ul>\n<li><strong>Generation Job status view</strong> (<code>GenerationJobStatus.jsx</code>): the step list and the &quot;Restart Step&quot; dropdown showed <code>Pack Creation</code> before <code>Primer Generation</code>, contradicting the backend <code>PIPELINE_STEP_ORDER</code> (which runs <code>PRIMER_GEN</code> before <code>PACK_CREATION</code>). Reordered the frontend <code>PIPELINE_STEPS</code> constant to match.</li>\n<li><strong>Graphic Novel substep accordion</strong>: the script step now always renders a collapsible accordion. Before the pipeline reaches the step (no per-pack data yet), it shows a &quot;Planning Substeps (preview)&quot; list of all 6 canonical substeps as PENDING, so the workflow is visible ahead of time. A new frontend <code>GRAPHIC_NOVEL_SUBSTEPS</code> constant mirrors <code>services/generation/constants.py</code>.</li>\n<li><strong>Generation view substep skeleton</strong> (<code>generation_views.py</code>): <code>GRAPHIC_NOVEL_SCRIPT_SUBSTEPS</code> was missing <code>cloze_generation</code> (added at index 3 in the 2026-05-29 cloze separation). Aligned it with the canonical 6-substep order; this also enables the working cloze restart button.</li>\n<li><strong>LLM Config step matrix</strong> (<code>/teacher/llm-config</code>): the Step Configuration tab rendered steps <strong>alphabetically</strong> (<code>order_by(&#x27;step_key&#x27;)</code>), scrambling the GN substeps (Beat Sheet, Cloze, Final Script, Premise Scoring, Router…). <code>llm_config_views.py</code> now sorts both the GET and PUT responses by <code>LLMStepConfig.StepKey</code> enum declaration order via a <code>_STEP_KEY_ORDER</code> index map, so the table follows true execution order.</li>\n<li><strong><code>LLMStepConfig.StepKey</code> enum</strong> (<code>models.py</code>): swapped <code>PACK_CREATION</code> and <code>PRIMER_GEN</code> so the enum declaration order matches pipeline execution order. Migration <code>0027_alter_llmstepconfig_step_key</code> (choices metadata only — no column or data change).</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-30", "note": "resume word-loss fix", "sections": [{"category": "Fixed", "title": "Pipeline Resume Losing Words After Mid-Dedup Failure", "html": "<ul>\n<li>When the dedup step failed partway through (e.g., embedding API timeout after processing 2 of 6 words), resuming the pipeline would only carry forward the partially-persisted words instead of the full set.</li>\n<li>Root cause: <code>_reconstruct_context</code> built <code>words_data</code> from the incomplete <code>word_set.words</code> when no completed DEDUP log existed, ignoring the full word list available in the WORD_LOOKUP log.</li>\n<li>Fix: <code>_reconstruct_context</code> now falls back to the WORD_LOOKUP log&#x27;s <code>word_lookup_snapshot</code> when no completed DEDUP log is found. Added <code>_latest_word_lookup_snapshot()</code> helper in <code>step_word_lookup.py</code>.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-30", "note": "pipeline clarity refactor", "sections": [{"category": "Refactor", "title": "Prompt & Validator Consolidation", "html": "<ul>\n<li><strong>World context preamble extracted</strong>: the ~60-word Lexi Legends world paragraph that was duplicated across 7 graphic novel prompt files now lives in a single <code>prompts/graphic_novel_world_context.txt</code>. Runtime injection happens in <code>_run_graphic_novel_substep</code> (between role line and step instructions). Prompt templates are shorter and world-rule changes need only one edit.</li>\n<li><strong>Scorer prompt parameterized</strong>: <code>graphic_novel_premise_scorer.txt</code> no longer hardcodes &quot;5 pages&quot;. Each premise is evaluated against its declared <code>page_count</code> (5 or 6). Location ceiling is page-count-aware (≤2 for 5-page, ≤3 for 6-page). Directly improves scoring quality for 6-page premises.</li>\n<li><strong>Uniform validator context</strong>: introduced <code>SubstepContext</code> dataclass in <code>graphic_novel_validators.py</code>. All graphic novel validators now accept <code>(result, ctx=None)</code> uniformly. Eliminated all lambda closures and ad-hoc <code>*_validator_summary</code> dicts from <code>graphic_novel_script.py</code>. Context holds <code>target_terms</code>, <code>winning_premise</code>, <code>selected_away_team</code>, <code>router_result</code>.</li>\n<li><strong>Placeholder comments removed</strong>: 9 dead <code># __PLACEHOLDER__</code> comments cleaned from <code>graphic_novel_script.py</code> and <code>graphic_novel_images.py</code>.</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li>250 tests passing (1 pre-existing unrelated failure in stale-job timeout detection view).</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-29", "note": "cloze generation separated", "sections": [{"category": "Changed", "title": "Cloze Generation as Dedicated Substep", "html": "<ul>\n<li>Cloze quiz generation moved out of the Final Script + Self-Check substep into its own dedicated substep (<code>cloze_generation</code>, index 3 in <code>GRAPHIC_NOVEL_SUBSTEPS</code>).</li>\n<li>Runs after premise scoring using only the winning premise + vocabulary words as context (no dependency on beat sheet or final script).</li>\n<li>New prompt template: <code>backend/vocabulary/prompts/graphic_novel_cloze.txt</code>.</li>\n<li>New LLM step config key: <code>gn_cloze_gen</code> (seeded via migration 0026).</li>\n<li>New validator: <code>_validate_graphic_novel_cloze_result</code> in <code>graphic_novel_validators.py</code>.</li>\n<li>Artifact file: <code>03b_cloze_generation.json</code> in the pack artifact directory.</li>\n<li>Final script prompts (5-page and 6-page) no longer mention or return <code>cloze_items</code>.</li>\n<li>Substep order is now: team_selection → router_premises → premise_scoring → cloze_generation → beat_sheet_vocab_roles → final_script_self_check (6 substeps total).</li>\n<li>Motivation: cleaner script generation prompt lets the LLM focus purely on narrative craft, improving script quality.</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li>All 335 tests passing (1 pre-existing unrelated failure in stale-job timeout detection).</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-29", "note": "pipeline reorder + definition consolidation", "sections": [{"category": "Changed", "title": "Pipeline Step Order", "html": "<ul>\n<li>Swapped Primer Generation (now step 5) and Pack Creation (now step 6) so that Pack Creation is adjacent to the graphic novel steps it feeds.</li>\n</ul>"}, {"category": "Changed", "title": "Review Definitions Consolidated into Primer Step", "html": "<ul>\n<li>Primer <code>kid_friendly_definition</code> changed from 1-2 sentence definitions to concise 3-8 word phrases suitable for vocabulary review cards.</li>\n<li>Removed <code>review_definitions</code> generation from the graphic novel script prompt (both 5-page and 6-page variants).</li>\n<li>Review page image generation now reads definitions from <code>PrimerCardContent.kid_friendly_definition</code> instead of <code>novel.metadata[&#x27;review_definitions&#x27;]</code>.</li>\n<li>Fallback: if a word has no <code>PrimerCardContent</code>, truncates <code>WordDefinition</code> to 8 words (unchanged).</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-29", "note": "graphic novel module split", "sections": [{"category": "Refactor", "title": "Split `step_graphic_novel.py` into Four Sibling Modules", "html": "<ul>\n<li>The 2003-line <code>vocabulary/services/generation/step_graphic_novel.py</code> was split into four files grouped by responsibility, with the original path kept as a thin re-export facade.</li>\n<ul>\n<li><code>graphic_novel_helpers.py</code> (~540 lines) — formatting helpers, artifact I/O, substep runner, character-color constants, secondary-character anchor generation, small pure helpers.</li>\n<li><code>graphic_novel_validators.py</code> (~400 lines) — every <code>_validate_*</code> function (team, router, scoring, beat, beat-complexity, vocab-anchors, script).</li>\n<li><code>graphic_novel_script.py</code> (~820 lines) — <code>_step_graphic_novel_script</code> and <code>restart_graphic_novel_from_substep</code>.</li>\n<li><code>graphic_novel_images.py</code> (~310 lines) — <code>_step_graphic_novel_images</code>.</li>\n<li><code>step_graphic_novel.py</code> (~95 lines) — facade that re-exports the public surface used by <code>__init__.py</code>, <code>orchestrator.py</code>, <code>generation_pipeline_service.py</code>, and the test suite.</li>\n</ul>\n<li>No behavior change. Public import paths (e.g. <code>from vocabulary.services.generation.step_graphic_novel import _step_graphic_novel_script, _validate_graphic_novel_router_result, _find_secondary_characters_needing_anchors, ...</code>) continue to work unchanged.</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li>Full graphic novel test module (<code>tests/vocabulary/test_generation_pipeline_service.py</code>) green: 57 passing, no test edits required.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-28", "note": "", "sections": [{"category": "Added", "title": "LLM Configuration Matrix (Admin)", "html": "<ul>\n<li><strong>LLMSite model</strong>: defines API proxy endpoints with name, base URL, provider type (<code>gemini_native</code> / <code>openai_compatible</code> / <code>anthropic</code>), and API key env var reference. Keys stay in <code>.env</code>; the model stores only the env var name and resolves at runtime.</li>\n<li><strong>LLMStepConfig model</strong>: maps each of 10 text-generation pipeline steps to a primary and fallback site+model pair. Steps: <code>word_lookup</code>, <code>translation</code>, <code>question_gen</code>, <code>pack_creation</code>, <code>primer_gen</code>, <code>gn_team_selection</code>, <code>gn_router_premises</code>, <code>gn_premise_scoring</code>, <code>gn_beat_sheet</code>, <code>gn_final_script</code>.</li>\n<li><strong>Admin UI</strong> at <code>/teacher/llm-config</code> (two tabs: Sites management, Step Configuration matrix). Accessible via &quot;LLM Config&quot; button in the navbar for admin users.</li>\n<li><strong>API endpoints</strong>: <code>GET/POST /api/admin/llm-sites/</code>, <code>PUT/DELETE /api/admin/llm-sites/&lt;id&gt;/</code>, <code>GET/PUT /api/admin/llm-step-configs/</code>.</li>\n<li><strong>llm_config_service.py</strong>: cached lookup layer (5-min TTL) providing <code>get_step_config(step_key)</code> → <code>{primary: {model, provider_type, base_url, api_key}, fallback: {...}}</code>. Raises <code>LLMConfigError</code> if no config exists for a step.</li>\n<li><strong>Pipeline dispatch refactored</strong>: orchestrator builds <code>[primary, primary, fallback]</code> attempt list from DB config instead of hardcoded constants. Each graphic novel substep looks up its own config independently.</li>\n<li><code>call_gemini()</code> and <code>call_anthropic()</code> now accept optional <code>api_key</code> and <code>base_url</code> overrides (backwards-compatible).</li>\n<li><code>call_anthropic()</code> now handles empty <code>user_prompt</code> by collapsing system prompt into the user message (matches Gemini proxy behavior; fixes 500 errors when routing steps with empty user_prompt to Anthropic).</li>\n<li>Migration <code>0025_llm_config</code> creates tables and seeds one default Gemini site with all 10 steps configured (primary: <code>gemini-3.1-pro-preview</code>, fallback: <code>gemini-3-pro-preview</code>).</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li>Updated <code>TestRunFullPipeline</code> assertions to match new config-dict dispatch (347 tests passing).</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-28", "note": "secondary character anchors", "sections": [{"category": "Added", "title": "Secondary Character Visual Anchors", "html": "<ul>\n<li>After the final script step, an extra LLM call generates a detailed visual reference sheet (~150 words covering body, face/hair, outfit, color priority, negative constraints) for secondary characters who have dialogue AND appear on non-consecutive pages. Prevents visual drift when a character skips a page and the image model has no prior reference.</li>\n<li>Detection logic: <code>_find_secondary_characters_needing_anchors(result)</code> scans the script output for non-hero characters with speech on non-consecutive pages.</li>\n<li>Storage: <code>novel.metadata[&#x27;secondary_character_anchors&#x27;]</code> — dict of <code>{name: anchor_text}</code>. No migration needed.</li>\n<li>Image prompt lookup (<code>_characters_for_graphic_novel_page</code>) now checks <code>LEXI_CHARACTERS</code> first (hero → canon injection), then stored anchors, then falls back to the brief <code>novel.characters</code> entry. Eliminates spurious &quot;Unknown character name&quot; warnings for LLM-invented secondary characters.</li>\n<li>Prompt template: <code>backend/vocabulary/prompts/secondary_character_anchor.txt</code>.</li>\n<li>Uses <code>gn_final_script</code> LLM config (same model that wrote the script).</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li>Added <code>TestFindSecondaryCharactersNeedingAnchors</code> (5 cases): empty pages, hero-only, speaking secondary with gap, non-speaking secondary, consecutive-only secondary.</li>\n<li><strong>Caveat (discovered 2026-06-01):</strong> these tests covered detection only, not the LLM call + storage path — which was broken from this commit until the 2026-06-01 fix above (the call returned a dict, not the assumed plain-text string, and the result was silently dropped).</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-29", "note": "", "sections": [{"category": "Changed", "title": "Unified 5/6-Page Graphic Novel Pipeline (Replaces Dual-Channel Architecture)", "html": "<ul>\n<li>Each pack now generates <strong>one</strong> graphic novel at a length the router LLM picks per premise (5 or 6 pages). The 6-page admin-only channel is removed.</li>\n<li>Router prompt: each candidate premise now declares <code>page_count_rationale</code> (one sentence) followed by <code>page_count</code> ∈ {5, 6}. Chain-of-thought ordering — rationale appears before the numeric decision.</li>\n<li>Scorer carries the winning premise&#x27;s <code>page_count</code> forward; beat-sheet and final-script substeps dispatch to the matching prompt template via <code>GRAPHIC_NOVEL_BEAT_SHEET_TEMPLATES = {5: &#x27;graphic_novel_beat_sheet&#x27;, 6: &#x27;graphic_novel_beat_sheet_6page&#x27;}</code> and the same shape for <code>_SCRIPT_TEMPLATES</code>.</li>\n<li>Pipeline trimmed from 10 to <strong>8 steps</strong>. Removed <code>GN_6PAGE_SCRIPT</code> / <code>GN_6PAGE_IMAGES</code> from <code>PIPELINE_STEP_ORDER</code>. Enum values stay on <code>GenerationJobLog.Step</code> so old log rows remain readable; no current code path emits them.</li>\n<li>Removed <code>GRAPHIC_NOVEL_6PAGE_ENABLED</code> setting and <code>GRAPHIC_NOVEL_6PAGE_SUBSTEPS</code> constant. Deleted <code>_step_graphic_novel_script_6page</code> and <code>_step_graphic_novel_images_6page</code>.</li>\n<li>Validators collapsed: one <code>_validate_graphic_novel_beat_result</code> (and one <code>_validate_graphic_novel_script_result</code>) reads expected length from <code>input_summary[&#x27;winning_premise&#x27;][&#x27;page_count&#x27;]</code>. Router validator <code>_validate_graphic_novel_router_result</code> now requires a non-empty <code>page_count_rationale</code> and <code>page_count</code> ∈ {5, 6} on every premise.</li>\n<li>Plot complexity caps now scale by chosen length via <code>max_locations_for_page_count(page_count)</code> helper (≤2 for 5-page, ≤3 for 6-page). Existing <code>GRAPHIC_NOVEL_MAX_LOCATIONS_5PAGE</code> / <code>_6PAGE</code> constants kept as the helper&#x27;s source of truth. Per the user&#x27;s call, the router has full latitude on length — no hard rules tying length to location count or secondary characters.</li>\n<li><code>GraphicNovel.channel</code> field stays as a vestigial column (always <code>&#x27;5page&#x27;</code> for new rows). <code>unique_together = (&#x27;pack&#x27;, &#x27;channel&#x27;)</code> retained. No DB migration; the field is harmless and a later cleanup migration can drop it.</li>\n<li><code>restart_graphic_novel_from_substep</code> recovers <code>winning_premise.page_count</code> from the saved router/scorer artifact and uses it for template dispatch on rerun.</li>\n<li><code>resume_pipeline</code> now treats a job whose <code>last_completed_step</code> is no longer in <code>PIPELINE_STEP_ORDER</code> (e.g. an in-flight job stamped <code>GN_6PAGE_*</code> before this change) as fully complete.</li>\n<li><code>novel.metadata[&#x27;page_count&#x27;]</code> is the new source of truth for downstream readers; <code>instructional_service.py</code> is unchanged because it iterates the saved page rows, not a fixed length.</li>\n<li><code>_run_graphic_novel_substep</code> extended with optional <code>prompt_template_name</code> override so the substep config record can stay length-neutral while individual calls swap templates.</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li>Added <code>TestRouterValidatorPageCount</code> (6 cases): accepts baseline; rejects missing/invalid/string <code>page_count</code>; rejects missing/blank <code>page_count_rationale</code>.</li>\n<li>Added <code>TestStepGraphicNovelScriptTemplateDispatch</code> (2 cases): verifies that <code>winning_premise.page_count == 5</code> invokes the 5-page beat-sheet/script templates and <code>== 6</code> invokes the 6-page templates; both also assert <code>novel.metadata[&#x27;page_count&#x27;]</code> is persisted.</li>\n<li>Removed legacy <code>_step_graphic_novel_script_6page</code> / <code>_step_graphic_novel_images_6page</code> mocks. Full backend suite green (347 passing).</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-27", "note": "afternoon", "sections": [{"category": "Changed", "title": "Graphic Novel Pedagogy Remediation (Moves 1/2/3)", "html": "<ul>\n<li><strong>Move 1 — Pedagogical anchor contract.</strong> Every router <code>vocab_integration_plan</code> item must now declare a <code>pedagogical_anchor = {anchor_type, anchor_sketch}</code> with <code>anchor_type</code> from <code>{demonstrated_action, near_synonym, category_example, visible_referent}</code>. Final script propagates these into per-page <code>vocab_anchors</code>. Constant: <code>GRAPHIC_NOVEL_PEDAGOGICAL_ANCHOR_TYPES</code>. Validator <code>_validate_vocab_integration_plan</code> rejects premises lacking the anchor.</li>\n<li><strong>Move 2 — Plot complexity caps.</strong> Each premise now carries <code>complexity_budget = {locations, secondary_characters, problem_thread}</code>. Hard caps: 5-page ≤2 locations / ≤2 secondary characters; 6-page ≤3 locations. Single-thread requirement enforced. Beat-sheet validator <code>_validate_beat_complexity</code> checks <code>setting_keys</code> count and that <code>characters_featured ⊆ away_team ∪ secondary_characters</code>. Constants: <code>GRAPHIC_NOVEL_MAX_LOCATIONS_5PAGE</code>, <code>GRAPHIC_NOVEL_MAX_LOCATIONS_6PAGE</code>, <code>GRAPHIC_NOVEL_MAX_SECONDARY_CHARACTERS</code>.</li>\n<li><strong>Move 3 — Mini cap tightened.</strong> <code>GRAPHIC_NOVEL_MAX_MINI_SUMMONS_PER_STORY</code> reduced from 2 to 1. Most vocab now integrates through dialogue/narration/world logic; the single allowed Mini is reserved for the most concrete/abstract word in the pack.</li>\n<li><strong>Shades removed.</strong> <code>shades_present</code> is no longer a team-selector flag or a downstream prompt input. The literal field survives only on legacy <code>GraphicNovel.metadata</code> rows (migration <code>0023_graphic_novel_lexi_legends_metadata</code>).</li>\n<li><strong>Scorer dimensions overhaul.</strong> <code>GRAPHIC_NOVEL_SCORING_DIMENSIONS</code> rewritten to <code>{narrative_clarity, visual_potential, vocabulary_integration, pedagogical_clarity, character_fit}</code>. Old dimensions (<code>narrative_engagement</code>, <code>ip_coherence</code>, <code>ink_over_reliance</code>, <code>originality</code>) dropped to refocus on ESL teaching value.</li>\n<li><strong>Doc clarifications.</strong> Graphic novel script step is Gemini <code>gemini-3.1-pro-preview</code> (not Claude Opus — that mention in CLAUDE.md/README/PROJECT_CONTEXT had been stale since the 2026-05-24 model switch). The Anthropic SDK and <code>ANTHROPIC_API_KEY</code> remain wired for fallback / future use; the dispatcher in <code>helpers.py</code> only routes to Anthropic when the model name contains <code>claude</code>/<code>sonnet</code>/<code>opus</code>/<code>haiku</code>.</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li>Updated <code>tests/vocabulary/test_generation_pipeline_service.py</code> fixtures for the new contracts (44/44 pipeline tests passing).</li>\n<li>Fixed <code>tests/vocabulary/test_llm_service.py::TestCallAnthropic</code> after a previous switch from <code>client.messages.create</code> to <code>client.messages.stream</code> left the mocks pointing at the wrong API. Added a <code>_make_stream_mock</code> helper that builds the streaming context-manager chain.</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-27", "note": "", "sections": [{"category": "Fixed", "title": "Gemini Proxy Routing & Timeout Handling", "html": "<ul>\n<li><code>call_gemini</code> now branches on <code>GEMINI_BASE_URL</code>: when set, uses the <strong>OpenAI SDK</strong> against the proxy&#x27;s <code>chat.completions</code> endpoint; when empty, uses the <code>google.genai</code> SDK natively. Fixes 403 errors from OpenAI-compatible proxies (e.g., <code>api.b.ai</code>) that only allow <code>/v1/chat/completions</code>, <code>/v1/messages</code>, <code>/v1/models</code> paths and rejected the native <code>:generateContent</code> calls the Google SDK was emitting.</li>\n<li>Empty <code>user_prompt</code> is now collapsed into a single user message before sending to the proxy. Several pipeline steps (<code>step_questions</code>, <code>step_packs</code>) pass the full prompt as <code>system_prompt</code> with an empty user message, which the proxy rejected with <code>400 &quot;at least one contents field is required&quot;</code>.</li>\n<li><code>GEMINI_BASE_URL</code> value normalized — trailing <code>/chat/completions</code> is stripped automatically since the OpenAI SDK appends it.</li>\n<li>OpenAI SDK auto-retries disabled (<code>max_retries=0</code>) and explicit <code>timeout=600.0</code> set on the proxy client. Previously the SDK&#x27;s hidden 2 retries stacked on top of orchestrator retries, turning a single failed call into three sequential 200-second proxy roundtrips before bubbling the error.</li>\n<li>Reduced <code>QUESTION_BATCH_SIZE</code> from 6 → 3 in <code>step_questions.py</code>. Smaller batches finish faster and reduce 502 Bad Gateway risk from upstream proxy timeouts on long LLM calls.</li>\n</ul>"}, {"category": "Changed", "title": "Lexi Mini System (Replaces Ink VFX)", "html": "<ul>\n<li>Replaced the abstract Ink-VFX vocabulary mechanic with the <strong>Lexi Mini system</strong>: writing a vocab word now summons a temporary monochromatic creature that physically acts out the word&#x27;s definition (Hugo→Dependable golems, Leo→Mischievous imps, Amara→Scholarly moths/sphinxes, Mei→Agile foxes/wyverns)</li>\n<li>Hard cap: 0–2 Mini summons per story; most vocab still integrates through dialogue, narration, or world logic</li>\n<li>Tool changes: Hugo&#x27;s flat paintbrush → orange <strong>carpenter&#x27;s pencil</strong>; Leo&#x27;s spray can → cyan <strong>chunky wax crayon</strong>. Amara&#x27;s golden quill and Mei&#x27;s multicolor marker unchanged.</li>\n<li>New rule: writing tools only appear on-page during a Lexi Mini summon. In zero-Mini panels, tools are not visible.</li>\n<li>Removed all Ink failure states (wobble/sag/drip/fade) — every Mini summon succeeds. Failure states were confusing for ESL learners and unrenderable in static panels.</li>\n<li><strong>Folio fully removed</strong> from canon, prompt pipeline, and review page logic. <code>folio_present</code> flag removed from team selector validation and <code>novel_metadata</code>. UI mascot decisions deferred — kept out of the generation pipeline.</li>\n<li>Pipeline: <code>GRAPHIC_NOVEL_ALLOWED_INTEGRATION_MODES</code> constant replaced <code>direct_ink_activation</code> with <code>lexi_mini_summon</code>. JSON field names <code>uses_direct_ink</code> and <code>ink_usage</code> retained for backwards compatibility (old novels in DB still render unchanged).</li>\n<li>Default <code>review_artifact_type</code> fallback: <code>Vault clue board</code> (was <code>Folio field guide</code>).</li>\n<li>Updated all 8 character prompt-injection files (Hugo/Leo/Amara/Mei × 9yo/12yo): replaced <code>INK_VFX_LOCK</code> with <code>LEXI_MINI_LOCK</code>, added tool-visibility rule, removed aerosol/paintbrush/failure language.</li>\n<li>Updated runtime canon: <code>team-selector-summaries.md</code>, <code>script-character-sheets.md</code>, <code>vault-zones-script.md</code> cleared of Folio and old tool references.</li>\n<li>Deleted <code>backend/data/canon/cast/folio/</code> directory.</li>\n</ul>"}, {"category": "Refactor", "title": "Canon Files Relocated", "html": "<ul>\n<li>Moved runtime canon files from <code>docs/feature_plan/runtime_canon/lexi_legends/</code> to <code>backend/data/canon/</code></li>\n<li>Moved <code>lexi-legends-cast-bible.md</code> from <code>docs/feature_plan/</code> to <code>backend/data/canon/</code></li>\n<li>Updated <code>canon_service.py</code> path constants to resolve from <code>backend/data/canon/</code></li>\n<li>Updated all skill files (setting-building-pipeline, review-canon-sheets, character-building-pipeline) to reference new paths</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-25", "note": "", "sections": [{"category": "Added", "title": "Dual-Channel Graphic Novel Generation", "html": "<ul>\n<li>Added 6-page graphic novel channel that runs alongside the existing 5-page pipeline</li>\n<li>Each generation job now produces two graphic novels per pack: 5-page (student-facing) and 6-page (admin-only)</li>\n<li><code>GraphicNovel</code> model changed from OneToOneField to ForeignKey with <code>channel</code> field (&#x27;5page&#x27;/&#x27;6page&#x27;) and <code>unique_together</code> constraint</li>\n<li>6-page channel runs its own independent 5-substep pipeline (team selection → router → scorer → beat sheet → final script) with dedicated prompts</li>\n<li>6-page channel generates images via OpenAI GPT-Image-2 (same as 5-page)</li>\n<li>6-page channel skips cloze item creation (5-page channel already creates them)</li>\n<li>Added <code>GRAPHIC_NOVEL_6PAGE_ENABLED</code> setting (default: True) to enable/disable the 6-page channel</li>\n<li>New pipeline steps: <code>GN_6PAGE_SCRIPT</code> and <code>GN_6PAGE_IMAGES</code> (steps 9-10)</li>\n<li>Student-facing instructional service only serves <code>channel=&#x27;5page&#x27;</code> novels</li>\n<li>New prompt templates: <code>graphic_novel_beat_sheet_6page.txt</code>, <code>graphic_novel_script_6page.txt</code></li>\n</ul>"}, {"category": "Fixed", "title": "6-Page Image Generation", "html": "<ul>\n<li>Fixed <code>_step_graphic_novel_images_6page</code> passing wrong keyword argument (<code>previous_image_path=</code>) to <code>_call_openai_image_releasing_db</code>; now correctly passes <code>reference_image=</code> with image bytes (matching 5-page behavior)</li>\n<li>Fixed orchestrator retry logic logging wrong model name (<code>gemini-3.1-pro-preview</code>) for image steps; now correctly logs <code>gpt-image-2</code></li>\n<li>Fixed 6-page image filenames: changed from <code>{vocab_words}_{pack_id}_6p{N}.png</code> to <code>{title_slug}_6p_page_{N}.png</code> to match 5-page naming convention</li>\n<li>Fixed <code>Unknown vault zone requested: &#x27;review-artifact&#x27;</code> warning: review pages now skip vault zone lookup entirely (they use their own <code>review_artifact_type</code> prompt field)</li>\n<li>Fixed <code>Duplicate entry for key &#x27;vocabulary_graphicnovel_pack_id_channel_uniq&#x27;</code> on pipeline resume: added defensive delete before novel creation for both channels to handle edge cases where the top-of-loop guard passes but a stale record exists</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-24", "note": "", "sections": [{"category": "Fixed", "title": "Translation Step Reliability", "html": "<ul>\n<li>Translation prompt now returns <code>term</code> field in each output object, enabling primary-key-based matching instead of fragile substring matching on <code>source_text</code></li>\n<li>Translation matching logic rewritten: looks up word by <code>term</code> (case-insensitive) rather than iterating all words with substring <code>in</code> checks</li>\n<li>Validation changed from &quot;all source_text pairs matched&quot; to &quot;all expected terms have translations&quot;</li>\n</ul>"}, {"category": "Changed", "title": "Primer Syllable Accuracy", "html": "<ul>\n<li>Added explicit single-syllable rule to primer prompt: output word as-is without dot characters</li>\n<li>Added phonetic syllable preference: use sound-based breaks over spelling-based when they differ (benefits ESL learners)</li>\n</ul>"}, {"category": "Perf", "title": "Graphic Novel Prompt Round 2 (Log Audit)", "html": "<ul>\n<li>Applied chain-of-thought JSON ordering: <code>team_rationale</code> moved before boolean decisions in team selector; <code>arc_planning</code> and <code>vocab_page_assignments</code> added before <code>beat_sheet</code> array in beat sheet prompt</li>\n<li>Added <code>total_ink_activations_planned</code> counter before vocab arrays in router (per premise) and beat sheet prompts to enforce the max-2 Ink activation limit</li>\n<li>Added <code>vocab_page_assignments</code> checklist in beat sheet — LLM assigns words to pages before generating the beat sheet, reducing word-dropping</li>\n<li>Beat sheet <code>page_turn_question</code> explicitly defined as <code>null</code> for Page 5 (removes ambiguous free-text workaround)</li>\n<li>Replaced &quot;K-8&quot; with &quot;ages 8–14&quot; across all 5 graphic novel prompt files</li>\n<li>Switched graphic novel script model from <code>claude-sonnet-4-6</code> to <code>gemini-3.1-pro-preview</code> (better structured JSON output)</li>\n<li>Added <code>_call_llm_releasing_db()</code> routing helper that picks Gemini or Anthropic backend based on model name</li>\n<li>Made <code>collapse_markdown()</code> public in <code>canon_service.py</code>; applied it to full visual character sheets before embedding in script step JSON (removes <code>\\n</code>/<code>##</code> noise from serialized prompts)</li>\n<li>Router: moved <code>vocab_integration_plan</code> before <code>premise</code> paragraph — forces model to plan vocab mechanics before writing narrative</li>\n<li>Scorer: added <code>dimension_rankings</code> scratchpad as first key — model ranks premises per dimension before assigning numeric scores</li>\n<li>Beat sheet: moved <code>vocab_roles</code> and <code>ink_usage</code> before <code>beat_sheet</code> array — model defines Ink mechanics before writing page beats</li>\n<li>Final script: added per-page <code>page_planning</code> object before <code>panels</code> — model verifies text budget, target words, layout, and shot scales before generating panel content</li>\n<li>Canon: added Ink mechanic examples (success + failure per character) to <code>team-selector-summaries.md</code> and <code>script-character-sheets.md</code> to ground Ink as a linguistic puzzle mechanic</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-23", "note": "", "sections": [{"category": "Changed", "title": "Graphic Novel Creative Flexibility Revision", "html": "<ul>\n<li>Pack grouping prompt: replaced prescriptive <code>story_engine_hint</code> (closed list of action-heavy engines) with free-text <code>narrative_approach</code> field; reframed grouping criteria around situational cohesion instead of conflict/plot mechanics; added explicit 5-page length warning</li>\n<li>Router prompt: replaced <code>story_engine</code> → <code>narrative_approach</code>, <code>central_problem</code> → <code>central_thread</code>; broadened agency definition; added 5-page complexity warning; expanded narrative approach examples (observational, slice-of-life, etc.)</li>\n<li>Scorer prompt: replaced <code>narrative_engagement</code> → <code>narrative_clarity</code> (rewards clarity over momentum); replaced &quot;flat pacing&quot; penalty with &quot;too many plot beats for 5 pages&quot;; updated winning premise schema</li>\n<li>Beat sheet prompt: relaxed &quot;hook + build momentum&quot; to &quot;draw in + develop the situation&quot;; added arc shape examples for observational/slice-of-life; replaced <code>anti_flatness_guard</code> with <code>narrative_coherence</code></li>\n<li>Team selector: added <code>sample_team_options()</code> coin flip — all-solo or all-dual options (forced 50/50 split); biased <code>shades_present</code> toward false (only for genuinely confusable meanings); biased <code>vault_framing</code> to require earning its page space</li>\n<li>Pipeline code: propagated field renames (<code>story_engine</code> → <code>narrative_approach</code>), updated validation to accept <code>central_thread</code></li>\n</ul>"}, {"category": "Fixed", "title": "Graphic Novel Script Retry and Validation", "html": "<ul>\n<li>Fixed <code>_text_terms_from_graphic_novel_page</code> crash when LLM returns <code>null</code> for narration/dialogue text fields (used <code>or &#x27;&#x27;</code> instead of <code>.get(key, &#x27;&#x27;)</code> which doesn&#x27;t handle explicit null)</li>\n<li>Fixed orchestrator retry restarting entire 5-substep flow from team_selection on final script failure; substeps now retry internally (1 retry per substep) and orchestrator runs GRAPHIC_NOVEL_SCRIPT only once</li>\n<li>Added substep-level restart: <code>POST /api/generation-jobs/{id}/restart-substep/</code> accepts <code>pack_id</code> and <code>substep</code> key, loads prior substep artifacts from disk, and re-runs from the target substep onward</li>\n<li>Frontend: each graphic novel substep row now shows a restart button (visible when job is not running)</li>\n</ul>"}, {"category": "Perf", "title": "Graphic Novel Prompt Restructuring", "html": "<ul>\n<li>All 5 script substeps now use system/user prompt split (instructions in system, data in user message)</li>\n<li>Removed <code>rulebook</code> and <code>learning_behavior</code> from all script step payloads (irrelevant to story generation)</li>\n<li>Created <code>team-selector-summaries.md</code> — purpose-built hero summaries + pairing dynamics for team selection</li>\n<li>Created <code>script-character-sheets.md</code> — narrative-only character info for router/scorer/beat sheet (no visual specs)</li>\n<li>Created <code>vault-summary-premises.md</code> — condensed vault context for premise generation (~30 lines vs ~200)</li>\n<li>Team selector now receives world primer, filtered hero summaries, and filtered pairing dynamics (only for teams in options)</li>\n<li>Router/scorer/beat sheet use lightweight <code>router_lexi_context</code> instead of full visual sheets</li>\n<li>Final script step retains full visual sheets + vault spec (needed for image generation downstream)</li>\n<li>Pairing dynamics converted from raw markdown to structured format across all steps</li>\n<li>Image prompts: panel content formatted as prose (not raw JSON), synopsis trimmed for pages 2+, setting context added for non-vault pages, vocabulary highlighting uses per-character Ink colors</li>\n<li>Added <code>canon_service.py</code> functions: <code>load_team_selector_heroes()</code>, <code>load_team_selector_dynamics()</code>, <code>load_script_character_sheets()</code>, <code>load_vault_summary_premises()</code></li>\n<li><code>_format_graphic_novel_prompt()</code> is now dead code (all steps pass templates directly)</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-22", "note": "", "sections": [{"category": "Refactor", "title": "Generation Pipeline Modularization", "html": "<ul>\n<li>Split <code>generation_pipeline_service.py</code> (2094 lines) into <code>vocabulary/services/generation/</code> package:</li>\n<ul>\n<li><code>orchestrator.py</code> — pipeline run/resume/restart control flow</li>\n<li><code>step_word_lookup.py</code> — steps 1-2: word lookup + dedup</li>\n<li><code>step_translations.py</code> — step 3: translations</li>\n<li><code>step_questions.py</code> — step 4: question generation</li>\n<li><code>step_packs.py</code> — steps 5-6: pack creation + primers</li>\n<li><code>step_graphic_novel.py</code> — steps 7-8: graphic novel script + images</li>\n<li><code>helpers.py</code> — shared LLM wrappers, logging utilities</li>\n<li><code>constants.py</code> — model names, step order, config constants</li>\n</ul>\n<li>Old import path (<code>vocabulary.services.generation_pipeline_service</code>) preserved via backwards-compatible shim</li>\n<li>Test patches updated to target actual module locations (<code>llm_service</code>, <code>embedding_service</code>, <code>orchestrator</code>)</li>\n<li>Fixed stale test assertion for canon character prompt injection content</li>\n</ul>"}, {"category": "Other", "title": "Graphic Novel Pipeline — Canon Service Integration", "html": "<ul>\n<li>Added <code>canon_service.py</code>: loads runtime canon files (character sheets, Vault specs, rulebook, pairing dynamics) into LLM prompts for visual and narrative consistency</li>\n<li>Beat sheet and script calls now receive full character <code>.md</code> sheets, Vault script context, rulebook, and learning behavior plan</li>\n<li>Image prompts now receive compact character design locks (<code>_prompt_injection.txt</code>) instead of LLM-invented descriptions</li>\n<li>Added STYLE_LOCK to <code>graphic_novel_page.txt</code> and <code>graphic_novel_review_page.txt</code> to prevent rendering style drift</li>\n<li>Vault page image prompts now use full Vault image specs + zone-specific overlays instead of a 3-line stub</li>\n<li>Team selector receives pairing dynamics from the cast bible for chemistry-aware team selection</li>\n<li>Team options randomized to 3 candidates (from 10) to encourage variety</li>\n<li>Added path traversal guards: character name allowlist and vault zone allowlist</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-16", "note": "", "sections": [{"category": "Other", "title": "Graphic Novel Reader UX Improvements", "html": "<ul>\n<li>Expanded reader width from 1080px to min(1792px, 90vw) so page images display closer to native resolution</li>\n<li>Vocabulary cards now shown by default on each page (previously required tapping the image)</li>\n<li>Page navigation (arrows, keyboard, swipe, dots) no longer hides vocabulary cards</li>\n<li>Merged title row and footer into a single sticky toolbar: page count + title on the left, page dots in the center, &quot;Done Reading&quot; button on the right</li>\n<li>Removed the instructional header (pack name + step label) to save vertical space</li>\n<li>&quot;Done Reading&quot; button now uses green color and fades in after a 3-second delay on the last page to encourage reading before advancing</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-15", "note": "", "sections": [{"category": "Fixed", "title": "", "html": "<ul>\n<li>Fixed review scheduling: <code>NextPracticeWordView</code> now includes questions with NULL <code>lexile_score</code> in the Lexile filter (matching <code>StudentDashboardView</code>), so newly learned words appear for same-day review even when their questions lack a Lexile score</li>\n<li>Fixed cloze blank fill: <code>ClozeQuiz</code> now splits on 3+ underscores (<code>/_{3,}/</code>) instead of exactly 7, so graphic novel cloze items with varying blank lengths render correctly</li>\n<li>Fixed TTS auto-play on type-in retry: after a successful retry submission via Enter, feedback buttons use <code>tabIndex={-1}</code> until ready, preventing the Enter keyup from activating the Explain button and triggering text-to-speech</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-14", "note": "", "sections": [{"category": "Other", "title": "Graphic Novel Instructional Flow", "html": "<ul>\n<li>Replaced new full-pipeline micro-story generation with AI-generated graphic novels for the instructional Read step</li>\n<li>Added <code>GraphicNovel</code> and <code>GraphicNovelPage</code> models plus migration <code>0018_graphic_novel</code>; each page stores one complete 1792x1024 landscape comic image and panel metadata</li>\n<li>Added migration <code>0019_graphic_novel_page_status</code> so each <code>GraphicNovelPage</code> tracks image-generation status, attempts, error text, start time, and completion time</li>\n<li>Added <code>GenerationJob.graphic_novels_created</code> and new pipeline log steps <code>GRAPHIC_NOVEL_SCRIPT</code> and <code>GRAPHIC_NOVEL_IMAGES</code></li>\n<li>Updated <code>PIPELINE_STEP_ORDER</code> to run <code>GRAPHIC_NOVEL_SCRIPT</code> and <code>GRAPHIC_NOVEL_IMAGES</code> after <code>PRIMER_GEN</code>; legacy <code>STORY_CLOZE_GEN</code> remains available for existing logs/manual use but is no longer used for new full-pipeline content</li>\n<li>Added <code>graphic_novel_script.txt</code> and <code>graphic_novel_page.txt</code> prompt templates</li>\n<li><code>call_openai_image()</code> now accepts a <code>size</code> parameter; graphic novel pages request <code>1792x1024</code></li>\n<li><code>GET /api/instructional/packs/&lt;pack_id&gt;/</code> now returns <code>story.type = &quot;graphic_novel&quot;</code> with page data for new packs and falls back to <code>story.type = &quot;micro_story&quot;</code> for legacy packs</li>\n<li>Added <code>GraphicNovelReader</code> with 16:9 page display, arrow/keyboard/swipe navigation, page dots, tap-to-open vocabulary overlay, and final-page completion</li>\n<li>Removed the old per-word visual generation path end to end: model fields, generated image records, practice/review UI, API payloads, stale prompts, and related tests.</li>\n<li>Updated admin generation status/review surfaces to display <code>Graphic Novel Script</code> and <code>Graphic Novel Images</code> instead of the legacy <code>Story &amp; Cloze Generation</code> label, and to expose generated graphic novel page data in review payloads</li>\n<li><code>GET /api/generation-jobs/&lt;id&gt;/</code> now includes <code>graphic_novel_image_pages</code> so the admin status page can show per-page <code>PENDING</code>/<code>RUNNING</code>/<code>COMPLETED</code>/<code>FAILED</code> progress for <code>GRAPHIC_NOVEL_IMAGES</code></li>\n<li><code>GRAPHIC_NOVEL_IMAGES</code> now skips completed page images, marks each page attempt independently, and fails the step if any page remains failed; Resume retries only missing/failed pages instead of starting from page 1</li>\n<li>Added explicit backend progress logging around graphic novel script and page image generation; LLM/image prompt logs continue to be written to <code>temp/llm_logs/</code></li>\n<li>Released Django/MySQL connections before and after slow Gemini/OpenAI calls in the background generation pipeline, and closed background-thread connections when pipeline/resume/restart exits, to avoid connection exhaustion during long graphic novel image generation</li>\n<li>Slowed the admin generation status polling interval from 3 seconds to 10 seconds to reduce database pressure while jobs are running; stale running jobs now record a FAILED log and reset the word set out of <code>GENERATING</code></li>\n<li>Added factories and focused tests for graphic novel models, generation steps, instructional API fallback, and OpenAI image size compatibility</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-13", "note": "", "sections": [{"category": "Other", "title": "Response-Quality-Aware Scheduling", "html": "<ul>\n<li><code>PracticeService</code> now classifies first-attempt answer quality using persisted <code>UserAnswer.duration_seconds</code>, <code>UserAnswer.answer_switches</code>, and <code>Question.question_type</code></li>\n<li>Correct answers use per-learner, per-question-type timing baselines only after 15 valid samples from the latest 50 first-attempt answers, filtering to <code>1 &lt; duration_seconds &lt; 100</code></li>\n<li>Correct answers without enough timing history use the previous behavior as <code>unclassified_correct</code></li>\n<li>Answer qualities now include <code>fast_correct</code>, <code>solid_correct</code>, <code>slow_correct</code>, <code>switched_correct</code>, <code>typo_retry_correct</code>, <code>incorrect</code>, and <code>unclassified_correct</code></li>\n<li><code>learning_speed</code> still uses an EMA, but each quality has its own quality value and immediate interval factor</li>\n<li>Incorrect answers always use the <code>incorrect</code> schedule adjustment, even without timing history</li>\n<li>Replaced the 0.5-day minimum review interval with a 1-day minimum so a student does not see the same word again on the same day</li>\n<li>Fragile correct answers may still promote, but if promotion happens, the next interval is capped by the old-level schedule</li>\n<li>Typo retries are now tracked server-side in the Django session after an <code>is_typo</code> response; the next first-attempt correct answer for that question becomes <code>typo_retry_correct</code></li>\n<li><code>/api/practice/submit/</code> responses now include scheduling metadata: <code>response_quality</code>, <code>is_fragile</code>, <code>review_interval_days</code>, <code>next_review_at</code>, and <code>schedule_reason</code></li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-05-01", "note": "", "sections": [{"category": "Other", "title": "Mastery Schedule & Hidden Long-Term Levels", "html": "<ul>\n<li>Added <code>MasteryLevel.is_hidden</code> and migration <code>0017_hidden_mastery_level</code></li>\n<li>Current mastery schedule: Level 1 <code>1d/2pts</code>, Level 2 <code>3d/4pts</code>, Level 3 <code>7d/7pts</code>, Level 4 <code>10d/10pts</code>, Level 5 <code>17d/15pts</code>, Level 6 <code>30d/25pts</code> hidden, Level 7 <code>60d/999pts</code> hidden</li>\n<li>Level 6 and 7 words are rolled into the student-facing Mastered accordion/list instead of appearing as separate levels</li>\n<li>Student dashboard daily/weekly mastery deltas ignore transitions that stay within the displayed Mastered bucket, including 5-&gt;6, 6-&gt;7, 7-&gt;6, and 6-&gt;5</li>\n<li>Practice questions for hidden levels ignore <code>Question.suitable_levels</code> and may use any question for the word within the student&#x27;s Lexile range</li>\n</ul>"}, {"category": "Other", "title": "Generation Pipeline Reliability & Observability", "html": "<ul>\n<li>Set content-generation default model to <code>gemini-3.1-pro-preview</code> with backup model <code>gemini-3-pro-preview</code></li>\n<li>Added per-step retry policy for Gemini-backed content steps: one retry with the current model, then one retry with the backup model</li>\n<li>Retry attempts are persisted as <code>GenerationJobLog</code> entries with attempt/model/next_model/error details</li>\n<li>Resume endpoint now writes a fresh RUNNING job log before starting the background thread so status polling does not immediately mark resumed jobs stale</li>\n</ul>"}]}, {"version": "Unreleased", "date": "2026-04-30", "note": "", "sections": [{"category": "Other", "title": "Image Generation Pipeline —Educational Value Rewrite", "html": "<ul>\n<li>Removed Hoyoverse/Genshin Impact aesthetic framing from creative direction and image generation prompts</li>\n<li>Added &quot;Definition Clarity Check&quot; instruction: LLM must verify a child could guess the word&#x27;s meaning from the image alone</li>\n<li>Scenes now grounded in real-world contexts (gym, nature, classroom) instead of fantasy/elemental settings</li>\n<li>Anime cel-shading retained as rendering style only, not compositional driver</li>\n</ul>"}, {"category": "Other", "title": "Image Generation Pipeline —Creative Direction Step (prior unreleased)", "html": "<ul>\n<li>Word lookup step now classifies each word into an image category</li>\n<li>Image generation switched from Gemini to OpenAI GPT-Image-2</li>\n</ul>\n<p class='blocknote'>---</p>"}]}, {"version": "Unreleased", "date": "2026-04-23", "note": "", "sections": [{"category": "Other", "title": "Daily Goal System", "html": "<ul>\n<li>Teacher-configurable daily goal bounds per student (<code>daily_goal_min</code>, <code>daily_goal_max</code>)</li>\n<li>Daily goal adjustment prompt with <code>last_goal_prompt_date</code> tracking</li>\n<li>New <code>StudentGoalPromptView</code> endpoint (<code>POST /student/goal-prompt-shown/</code>)</li>\n<li>Default daily question limit changed from 20 to 30</li>\n<li>Goal bounds validation in <code>StudentCreateUpdateSerializer</code> (min &gt;= 10, min &lt;= limit &lt;= max)</li>\n<li>Dashboard API returns <code>daily_goal_min</code>, <code>daily_goal_max</code>, <code>last_goal_prompt_date</code></li>\n</ul>"}, {"category": "Other", "title": "Student Names", "html": "<ul>\n<li>Added <code>first_name</code> and <code>last_name</code> fields to student serializers (User, TeacherStudent, StudentCreateUpdate, Roster)</li>\n<li>Bulk student creation now accepts <code>first_name</code> and <code>last_name</code></li>\n</ul>"}, {"category": "Other", "title": "Practice Session Rework", "html": "<ul>\n<li>Scaffolded retry system: <code>is_retry</code> flag on answer submission skips mastery/XP updates, increments <code>retry_count</code> on UserAnswer</li>\n<li>Lexile filtering now includes <code>lexile_score__isnull=True</code> questions (fallback for unscored questions)</li>\n<li>Streak tracking uses <code>timezone.localdate()</code> instead of <code>date.today()</code> for timezone correctness</li>\n<li>Redesigned PracticeView with improved layout and interaction flow</li>\n</ul>"}, {"category": "Other", "title": "Curriculum & Level Model Changes", "html": "<ul>\n<li>Level now has a ForeignKey to Curriculum (scoped levels per program)</li>\n<li>Level <code>name</code> uniqueness changed from global to <code>unique_together = [(&#x27;curriculum&#x27;, &#x27;name&#x27;)]</code></li>\n<li><code>LevelViewSet</code> supports <code>?curriculum_id=</code> query param filtering</li>\n<li>WordSetFormSerializer resolves <code>curriculum_name</code> and <code>level_name</code> via <code>get_or_create</code></li>\n<li>Removed <code>unit_or_chapter</code> from WordSet serializers</li>\n</ul>"}, {"category": "Other", "title": "Mastery Level Interval Update", "html": "<ul>\n<li>Spaced repetition intervals changed: Level 1: 0鈫?d, Level 2: 1鈫?d, Level 3: 3鈫?d, Level 4: 7鈫?0d, Level 5: 14鈫?0d</li>\n<li>Data migration with reversible <code>revert_intervals</code></li>\n</ul>"}, {"category": "Other", "title": "Image Generation Config", "html": "<ul>\n<li>Separate <code>IMAGE_API_KEY</code> and <code>IMAGE_BASE_URL</code> settings (defaults to Gemini credentials)</li>\n</ul>"}, {"category": "Other", "title": "Frontend Overhaul", "html": "<ul>\n<li>Simplified GenerationWizard, GenerationReview, and GenerationJobStatus components</li>\n<li>Streamlined CommandCenter, StudentProgressDashboard, and WordSetDetailView</li>\n<li>Refactored form modals with SearchableSelect component for curriculum/level dropdowns</li>\n<li>New <code>teacher.css</code> stylesheet</li>\n<li>Updated student styles: dashboard, practice, feedback, and component CSS</li>\n<li>Improved MicroStoryView and PrimerCard rendering</li>\n<li>Navbar and layout adjustments for Student and Teacher views</li>\n</ul>"}, {"category": "Other", "title": "", "html": "<ul>\n<li><code>0002_add_daily_goal_bounds</code> —daily_goal_min, daily_goal_max, last_goal_prompt_date on CustomUser</li>\n<li><code>0010_level_curriculum_alter_level_name_and_more</code> —Level FK to Curriculum, scoped uniqueness</li>\n<li><code>0012_add_retry_count_to_useranswer</code> —retry_count field on UserAnswer</li>\n<li><code>0013_update_mastery_level_intervals</code> —updated spaced repetition intervals</li>\n<li><code>0017_hidden_mastery_level</code> - adds hidden long-term mastery levels and updates the current spaced repetition schedule</li>\n</ul>"}, {"category": "Test", "title": "", "html": "<ul>\n<li>Expanded test coverage: views, serializers, models, adapted services, embedding service</li>\n</ul>\n<p class='blocknote'>---</p>"}]}, {"version": "0.6.0", "date": "2026-04-06", "note": "", "sections": [{"category": "Other", "title": "Beta Readiness —Bookmarks, Generation Requests, UX Fixes", "html": "<p class='blocknote'><strong>Teacher workflow:</strong></p>\n<ul>\n<li>Word set bookmarks with toggle (star) button and Bookmarked tab</li>\n<li>4-tab word set list: My Sets / Bookmarked / Public / All</li>\n<li>&quot;Request Generation&quot; button for teachers, with admin queue page</li>\n<li>Generation queue badge in admin navbar (polls every 60s)</li>\n<li>Already-assigned indicators in assign modal</li>\n<li>Live word count in word set form textarea</li>\n<li>Toast notifications replace alert() for assign success</li>\n</ul>\n<p class='blocknote'><strong>Security &amp; stability:</strong></p>\n<ul>\n<li>Login rate limiting (5/min per IP via AnonRateThrottle)</li>\n<li>Global React ErrorBoundary with reload fallback</li>\n<li><code>.env.example</code> template for onboarding</li>\n</ul>\n<p class='blocknote'><strong>Code quality (from /simplify):</strong></p>\n<ul>\n<li>Toast uses <code>{type, text}</code> object instead of fragile string matching</li>\n<li><code>canRequestGeneration</code> checks <code>input_words</code> existence</li>\n<li><code>WordInfo</code> moved outside component to avoid re-creation per render</li>\n<li>CSS <code>!important</code> replaced with proper specificity</li>\n<li>Empty catch blocks now log errors</li>\n<li>Backend <code>input_words</code> check uses <code>isinstance</code></li>\n</ul>\n<p class='blocknote'>---</p>"}]}, {"version": "0.5.0", "date": "2026-04-03", "note": "", "sections": [{"category": "Other", "title": "New Question Types, Picture-Word Match, Type-to-Spell, Typo Detection", "html": "<ul>\n<li>8 new question types (REVERSE_DEFINITION_MC, SYNONYM_IN_CONTEXT_MC, etc.)</li>\n<li>Picture-word match generation pipeline step</li>\n<li>Type-to-spell mode for higher Lexile students</li>\n<li>Damerau-Levenshtein typo detection with retry-without-penalty</li>\n</ul>\n<p class='blocknote'><strong>Code quality (from /simplify):</strong></p>\n<ul>\n<li>Fix race condition where typo could prematurely end practice session</li>\n<li>Batch N+1 queries in image and picture-match generation steps</li>\n<li>Replace per-word <code>ORDER BY RANDOM()</code> with pre-fetched distractor pool</li>\n<li>Move <code>QUESTION_TYPE_LEVEL</code> to <code>constants.py</code> alongside related mappings</li>\n<li>Move inline imports to top-level, add focus handler debounce</li>\n</ul>\n<p class='blocknote'>---</p>"}]}, {"version": "0.4.0", "date": "2026-03-24", "note": "", "sections": [{"category": "Other", "title": "Generation Pipeline Quality & Token Reduction", "html": "<p class='blocknote'><strong>Pipeline-wide:</strong></p>\n<ul>\n<li>Switch from Claude Opus to Gemini 3.1 Pro for all text generation</li>\n<li>Add <code>call_gemini()</code> text generation function to llm_service</li>\n<li>Apply 15% Lexile offset so scaffolding text is easier than target vocab</li>\n<li>Add 512x512 square image generation with low resolution setting</li>\n</ul>\n<p class='blocknote'><strong>Step 1 —Word Lookup:</strong></p>\n<ul>\n<li>Remove per-word <code>source_context</code> from JSON output to save tokens</li>\n<li>Build <code>source_context</code> from job metadata instead</li>\n</ul>\n<p class='blocknote'><strong>Step 3 —Translation:</strong></p>\n<ul>\n<li>Rewrite prompt with two strategies: native equivalent for definitions, natural translation for example sentences</li>\n<li>Include term in items list for better context</li>\n</ul>\n<p class='blocknote'><strong>Step 4 —Questions:</strong></p>\n<ul>\n<li>Remove redundant WORD ENRICHMENT step that duplicated Steps 1 and 3</li>\n<li>Pass full definition and <code>example_sentence</code> from Step 1 directly</li>\n<li>Simplify output format: flat term + questions instead of nested word array</li>\n</ul>\n<p class='blocknote'><strong>Step 5 —Pack Grouping:</strong></p>\n<ul>\n<li>Add creative writer and curriculum architect roles</li>\n<li>Add <code>text_type</code> field (fiction/narrative_nonfiction) to WordPack model</li>\n<li>LLM evaluates word nature and assigns best text type per pack</li>\n<li>Change max words per pack from 5 to 6 with balanced distribution</li>\n</ul>\n<p class='blocknote'><strong>Step 6 —Primers:</strong></p>\n<ul>\n<li>Calibrate kid-friendly definitions to target Lexile level</li>\n<li>Add Lexile band guidelines (below 600L through above 1000L)</li>\n</ul>\n<p class='blocknote'><strong>Step 7 —Stories:</strong></p>\n<ul>\n<li>Rewrite prompt for engaging fiction and narrative non-fiction</li>\n<li>Fiction: high-stakes show-don&#x27;t-tell scenes</li>\n<li>Narrative non-fiction: fascinating hooks and real-world contexts</li>\n</ul>\n<p class='blocknote'><strong>Step 8 —Images:</strong></p>\n<ul>\n<li>Square 1:1 aspect ratio prompt for vocabulary cards</li>\n<li>Low resolution (512x512) for faster generation</li>\n</ul>\n<p class='blocknote'>---</p>"}]}, {"version": "0.3.1", "date": "2026-03-14", "note": "", "sections": [{"category": "Other", "title": "Pipeline & Image Fixes", "html": "<ul>\n<li>Auto-approve generated images, skip manual review step</li>\n<li>Update image generation model to <code>gemini-3.1-flash-image-preview</code></li>\n<li>Clear existing words before running generation pipeline (prevents duplicates on re-run)</li>\n<li>Fix Gemini API call: combine system and user prompts when user_prompt is empty</li>\n</ul>\n<p class='blocknote'>---</p>"}]}, {"version": "0.3.0", "date": "2026-03-13", "note": "", "sections": [{"category": "Other", "title": "Student Dashboard Polish & Practice UI", "html": "<ul>\n<li>Per-tier gradient badges (Bronze/Silver/Gold/Platinum/Diamond)</li>\n<li>Flame/snowflake icons for streak and freeze stats</li>\n<li>Freeze info popup explaining streak freeze mechanic</li>\n<li>Fix settings panel button styles overridden by global CSS</li>\n<li>Practice session CSS rewrite to match mockup (gradient header, rounded cards, feedback chips)</li>\n<li>StudentNavbar added to practice session route</li>\n<li>LLM call logging to <code>temp/llm_logs/</code></li>\n<li>Fix: preserve completed pack progress when re-assigning word sets</li>\n</ul>\n<p class='blocknote'>---</p>"}]}, {"version": "0.2.0", "date": "2026-03-01", "note": "", "sections": [{"category": "Other", "title": "Complete Generation Pipeline & Practice Bug Fixes", "html": "<ul>\n<li>8-step AI content generation pipeline (word lookup, dedup, translations, questions, packs, primers, stories/cloze, images) with resume support</li>\n<li>Incremental word addition to existing generated word sets</li>\n<li>Generation wizard with live status polling and review/approve UI</li>\n<li>Fix spaced repetition: exclude already-answered words from session and dashboard due count</li>\n<li>Fix teacher roster due count to match student view (filter by READY status)</li>\n<li>Add Vite proxy for <code>/media</code> to serve generated images in dev</li>\n</ul>\n<p class='blocknote'>---</p>"}]}, {"version": "0.1.1", "date": "2026-02-28", "note": "", "sections": [{"category": "Other", "title": "Admin Generation UI (Phase 5)", "html": "<ul>\n<li>Generation wizard, job progress monitor, and content review pages</li>\n<li>Backend endpoints for fetching generated content and bulk-approving images</li>\n</ul>\n<p class='blocknote'>---</p>"}]}, {"version": "0.1.0", "date": "2026-02-28", "note": "", "sections": [{"category": "Other", "title": "Full-Stack Rebuild (Phases 1—)", "html": "<ul>\n<li>Initial full-stack rebuild of Vocab App V2</li>\n<li>Django backend with REST API</li>\n<li>React frontend with Vite</li>\n<li>User management (teachers, students, groups)</li>\n<li>Word set CRUD and assignment workflow</li>\n<li>Spaced repetition practice engine</li>\n<li>Student and teacher dashboards</li>\n</ul>"}]}];
const CAT_ORDER = ["Added","Changed","Fixed","Refactor","Perf","Test","Chore","Docs","Other"];

const cats = new Set();
DATA.forEach(e => e.sections.forEach(s => cats.add(s.category)));
const orderedCats = CAT_ORDER.filter(c => cats.has(c)).concat([...cats].filter(c => !CAT_ORDER.includes(c)));

const active = new Set(orderedCats);
const filtersEl = document.getElementById("filters");
orderedCats.forEach(c => {
  const b = document.createElement("span");
  b.className = "chip on"; b.dataset.cat = c; b.textContent = c;
  b.onclick = () => { b.classList.toggle("on"); b.classList.contains("on") ? active.add(c) : active.delete(c); render(); };
  filtersEl.appendChild(b);
});

function tagClass(c){ return "tag tag-" + c.replace(/\s+/g,'.'); }

const tl = document.getElementById("timeline");
function render(){
  const q = document.getElementById("search").value.trim().toLowerCase();
  tl.innerHTML = "";
  let shown = 0;
  DATA.forEach((e, ei) => {
    const secs = e.sections.filter(s => active.has(s.category));
    const hay = (e.date+" "+e.version+" "+e.note+" "+e.sections.map(s=>s.category+" "+s.title+" "+s.html).join(" ")).toLowerCase();
    if (q && !hay.includes(q)) return;
    if (!secs.length) return;
    shown++;
    const entry = document.createElement("div");
    entry.className = "entry";
    let secHtml = secs.map((s, si) => {
      const collapsed = (q || expandedDefault) ? "" : "";
      return `<div class="section" data-key="${ei}-${si}">
        <div class="shead">
          <span class="${tagClass(s.category)}">${s.category}</span>
          <span class="stitle">${s.title || ""}</span>
          <span class="caret">▼</span>
        </div>
        <div class="sbody">${s.html}</div>
      </div>`;
    }).join("");
    entry.innerHTML = `
      <div class="ehead">
        <span class="date">${e.date || "—"}</span>
        ${e.version ? `<span class="ver">${e.version}</span>` : ""}
        ${e.note ? `<span class="note">${e.note}</span>` : ""}
      </div>
      <div class="card">${secHtml}</div>`;
    tl.appendChild(entry);
  });
  // wire collapse toggles
  tl.querySelectorAll(".shead").forEach(h => {
    h.onclick = () => h.parentElement.classList.toggle("collapsed");
  });
  document.getElementById("empty").style.display = shown ? "none" : "block";
  document.getElementById("count").textContent = shown + " entr" + (shown===1?"y":"ies") + " shown";
}
let expandedDefault = true;
document.getElementById("search").addEventListener("input", render);
document.getElementById("expandAll").onclick = () => tl.querySelectorAll(".section").forEach(s=>s.classList.remove("collapsed"));
document.getElementById("collapseAll").onclick = () => tl.querySelectorAll(".section").forEach(s=>s.classList.add("collapsed"));
render();
</script>
</body>
</html>
